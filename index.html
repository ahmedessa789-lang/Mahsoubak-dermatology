/* ===== v6.8 Professional Graphic UI Theme ===== */
:root{
  --premium-navy:#061826;
  --premium-slate:#0f2535;
  --premium-teal:#12b8a6;
  --premium-cyan:#38bdf8;

  --premium-green:#22c55e;

  --premium-red:#ef4444;

  --glass:rgba(255,255,255,.86);
}
body{
  background:

    radial-gradient(circle at 80% 20%, rgba(20,184,166,.24) 0, transparent 28%),
    linear-gradient(135deg,#061826 0%,#0b2233 38%,#eff7f8 38%,#f8fafc 100%);
  background-attachment:fixed;
}
body:before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:-1;
  background-image:
    linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),

  mask-image:linear-gradient(180deg,rgba(0,0,0,.9),rgba(0,0,0,.18));

function T(k){return (TR[lang]&&TR[lang][k])||k} function uid(){return 'id_'+Math.random().toString(36).slice(2,9)+Date.now().toString(36)} function today(){return new Date().toISOString().slice(0,10)} function n(v){return Number(v||0)} function money(v){return Number(v||0).toLocaleString('en-EG')+' EGP'} function esc(v){return String(v??'').replace(/[&<>'"]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[s]))}

function monthStart(){let d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-01'}
function loadReportRange(){try{return JSON.parse(localStorage.getItem('mb_report_range'))||{from:monthStart(),to:today()}}catch(e){return {from:monthStart(),to:today()}}}
function saveReportRange(){localStorage.setItem('mb_report_range',JSON.stringify(reportRange))}
function rowDate(row){return String(row&&row.date?row.date:'').slice(0,10)}
function inRange(row){let d=rowDate(row);if(!d)return true;return (!reportRange.from||d>=reportRange.from)&&(!reportRange.to||d<=reportRange.to)}
function filteredSales(){return db.sales.filter(inRange)}
function filteredPurchases(){return db.purchases.filter(inRange)}
function filteredCollections(){return db.collections.filter(inRange)}
function filteredOperations(){return db.operations.filter(inRange)}
function filteredJournal(){ensureAccounting();return db.journal.filter(inRange)}
function setDashboardRange(){reportRange={from:document.getElementById('rep_from')?.value||'',to:document.getElementById('rep_to')?.value||''};saveReportRange();renderDashboard()}
function resetDashboardRange(){reportRange={from:monthStart(),to:today()};saveReportRange();renderDashboard()}
function reportPeriodLabel(){return (reportRange.from||'...')+' → '+(reportRange.to||'...')}
function repAchievementFiltered(id){return filteredSales().filter(s=>s.rep_id===id).reduce((a,s)=>a+n(s.total),0)}
function totalRepAchievedFiltered(){return db.reps.reduce((a,r)=>a+repAchievementFiltered(r.id),0)}
function avgRepPercentFiltered(){let t=totalRepTarget();return t?Math.round(totalRepAchievedFiltered()/t*100):0}
function filteredSummary(){let fs=filteredSales(),fp=filteredPurchases(),fc=filteredCollections(),fo=filteredOperations();return {sales:fs.reduce((a,s)=>a+n(s.total),0),purchases:fp.reduce((a,s)=>a+n(s.total),0),collections:fc.reduce((a,c)=>a+n(c.amount),0),operations:fo.length,soldOps:fo.filter(o=>o.status==='sold').length,pendingOps:fo.filter(o=>o.status==='requested').length,invoiceCount:fs.length,purchaseCount:fp.length,collectionCount:fc.length}}
function dashboardRangeControls(){let s=filteredSummary();return `<div class="report-filter no-print"><div class="section-title"><div><h3>${lang==='ar'?'تقارير الشاشة الرئيسية حسب المدة':'Dashboard reports by period'}</h3><div class="range-note">${lang==='ar'?'اختر من تاريخ إلى تاريخ ثم اطبع أو صدّر التقرير':'Choose a date range, then print or export the report'}</div></div><span class="report-pill">${reportPeriodLabel()}</span></div><div class="date-row"><div><label>${lang==='ar'?'من تاريخ':'From date'}</label><input id="rep_from" type="date" value="${esc(reportRange.from||'')}"></div><div><label>${lang==='ar'?'إلى تاريخ':'To date'}</label><input id="rep_to" type="date" value="${esc(reportRange.to||'')}"></div><button class="btn ok" onclick="setDashboardRange()">${lang==='ar'?'تطبيق المدة':'Apply range'}</button><button class="btn secondary" onclick="resetDashboardRange()">${lang==='ar'?'الشهر الحالي':'This month'}</button><button class="btn blue" onclick="printRangeReport()">${lang==='ar'?'طباعة تقرير المدة':'Print period report'}</button><button class="btn secondary" onclick="exportRangeCSV()">${lang==='ar'?'تصدير CSV للمدة':'Export period CSV'}</button></div></div><div class="range-report"><div class="stat"><span>${T('salesTotal')}</span><strong>${money(s.sales)}</strong></div><div class="stat"><span>${T('purchasesTotal')}</span><strong>${money(s.purchases)}</strong></div><div class="stat"><span>${T('collections')}</span><strong>${money(s.collections)}</strong></div><div class="stat"><span>${T('operations')}</span><strong>${s.operations}</strong></div></div>`}
function rangeSalesTable(){let arr=filteredSales();if(!arr.length)return `<div class="empty">${T('empty')}</div>`;return `<table><tr><th>${T('date')}</th><th>${T('customer')}</th><th>${T('rep')}</th><th>${T('product')}</th><th>${T('qty')}</th><th>${T('total')}</th><th>${T('paid')}</th><th>${T('remaining')}</th></tr>${arr.map(s=>`<tr><td>${esc(s.date)}</td><td>${esc(s.customer_name)}</td><td>${esc(s.rep_name||'')}</td><td>${esc(s.product_name)}</td><td>${n(s.qty)}</td><td>${money(s.total)}</td><td>${money(s.paid)}</td><td>${money(s.remaining)}</td></tr>`).join('')}</table>`}
function rangeCollectionsTable(){let arr=filteredCollections();if(!arr.length)return `<div class="empty">${T('empty')}</div>`;return `<table><tr><th>${T('date')}</th><th>${T('customer')}</th><th>${T('collector')}</th><th>${T('amount')}</th><th>${T('method')}</th></tr>${arr.map(c=>`<tr><td>${esc(c.date)}</td><td>${esc(c.customer_name)}</td><td>${esc(c.rep_name||'')}</td><td>${money(c.amount)}</td><td>${esc(c.method||'')}</td></tr>`).join('')}</table>`}
function rangePurchasesTable(){let arr=filteredPurchases();if(!arr.length)return `<div class="empty">${T('empty')}</div>`;return `<table><tr><th>${T('date')}</th><th>${T('supplier')}</th><th>${T('product')}</th><th>${T('qty')}</th><th>${T('total')}</th><th>${T('paid')}</th><th>${T('remaining')}</th></tr>${arr.map(p=>`<tr><td>${esc(p.date)}</td><td>${esc(p.supplier_name)}</td><td>${esc(p.product_name)}</td><td>${n(p.qty)}</td><td>${money(p.total)}</td><td>${money(p.paid)}</td><td>${money(p.remaining)}</td></tr>`).join('')}</table>`}
function rangeRepsTable(){if(!db.reps.length)return `<div class="empty">${T('empty')}</div>`;return `<table><tr><th>${T('rep')}</th><th>${T('target')}</th><th>${lang==='ar'?'مبيعات الفترة':'Period sales'}</th><th>${T('achievement')}</th></tr>${db.reps.map(r=>{let a=repAchievementFiltered(r.id),pct=n(r.target)?Math.round(a/n(r.target)*100):0;return `<tr><td>${esc(r.name)}</td><td>${money(r.target)}</td><td>${money(a)}</td><td>${pct}%<div class="progress"><span style="width:${Math.min(100,pct)}%"></span></div></td></tr>`}).join('')}</table>`}
function rangeReportHTML(){let s=filteredSummary();return `<div class="print-range-report"><h1>${lang==='ar'?'تقرير أداء الشركة':'Company performance report'}</h1><p>${lang==='ar'?'الفترة':'Period'}: <b>${reportPeriodLabel()}</b></p><div class="summary-grid"><div class="summary-box"><span>${T('salesTotal')}</span><b>${money(s.sales)}</b></div><div class="summary-box"><span>${T('purchasesTotal')}</span><b>${money(s.purchases)}</b></div><div class="summary-box"><span>${T('collections')}</span><b>${money(s.collections)}</b></div><div class="summary-box"><span>${T('operations')}</span><b>${s.operations}</b></div></div><h2>${lang==='ar'?'مبيعات الفترة':'Period sales'}</h2>${rangeSalesTable()}<h2>${lang==='ar'?'تحصيلات الفترة':'Period collections'}</h2>${rangeCollectionsTable()}<h2>${lang==='ar'?'مشتريات الفترة':'Period purchases'}</h2>${rangePurchasesTable()}<h2>${lang==='ar'?'أداء البياعين خلال الفترة':'Sales rep performance during period'}</h2>${rangeRepsTable()}</div>`}

      <div class="insight-card insight-debt"><div class="section-title"><h3>${T('customerDebt')}</h3><button class="btn small secondary" onclick="show('customers')">${T('customers')}</button></div>${customerDebtTable()}</div>
      <div class="insight-card insight-expiry"><div class="section-title"><h3>${T('expiryAlert')}</h3><button class="btn small secondary" onclick="show('products')">${T('products')}</button></div>${expiryTable()}</div>

</div>`}
function compactDashboardBox(key,title,value,lines){let hint=lang==='ar'?'فتح التفاصيل':'Open details';return `<div class="module-tile tile-${key}" onclick="openDashboardCard('${key}')"><div class="tile-icon">${icons[key]||'📌'}</div><div class="tile-body"><div class="tile-title">${title}</div><div class="tile-value">${value}</div><div class="tile-lines">${lines.map(x=>`<span>${x}</span>`).join('')}</div></div><div class="tile-open">${hint}</div></div>`}
function expiryTable(){let arr=db.products.map(p=>({p,st:expiryStatus(p)})).filter(x=>x.st.cls==='warn'||x.st.cls==='low');if(!arr.length)return `<div class="empty">${T('empty')}</div>`;return `<table><tr><th>${T('product')}</th><th>${T('expiry')}</th><th>${T('status')}</th></tr>${arr.map(x=>`<tr><td>${esc(x.p.name)}</td><td>${esc(x.p.expiry)}</td><td><span class="badge ${x.st.cls}">${x.st.label} ${x.st.days!==null?Math.abs(x.st.days)+' '+T('daysLeft'):''}</span></td></tr>`).join('')}</table>`}
function repChart(){if(!db.reps.length)return `<div class="empty">${T('empty')}</div>`;return db.reps.map(r=>{let a=repAchievement(r.id),pct=n(r.target)?Math.min(100,Math.round(a/n(r.target)*100)):0;return `<div style="margin-bottom:12px"><b>${esc(r.name)}</b> <span class="hint">${money(a)} / ${money(r.target)}</span><div class="chartbar"><span style="width:${pct}%"></span></div></div>`}).join('')}
function customerDebtTable(){let arr=db.customers.filter(c=>n(c.balance)>0);if(!arr.length)return `<div class="empty">${T('empty')}</div>`;return `<table><tr><th>${T('customer')}</th><th>${T('phone')}</th><th>${T('balance')}</th></tr>${arr.map(c=>`<tr><td>${esc(c.name)}</td><td>${esc(c.phone)}</td><td>${money(c.balance)}</td></tr>`).join('')}</table>`}
function dashboardBox(key,title,label,value,bars,metrics){let hint=lang==='ar'?'اضغط للتفاصيل':'Click for details';return `<div class="dash-card dash-${key}" onclick="openDashboardCard('${key}')"><div class="dash-head"><div><div class="dash-title">${title}</div><div class="dash-sub">${label}</div></div><div class="dash-value">${value}</div></div>${miniBars(bars)}<div class="metric-list">${metrics.map(m=>`<div class="metric-row"><span>${m[0]}</span><b>${m[1]}</b><div class="mini-progress"><span style="width:${metricWidth(m[1])}%"></span></div></div>`).join('')}</div><div class="open-hint">${hint}</div></div>`}
function miniBars(arr){return `<div class="mini-bars">${arr.map(x=>{let pct=Math.max(7,Math.min(100,Math.round(n(x.v)/Math.max(n(x.max),1)*100)));return `<div class="mini-col"><i style="height:${pct}%"></i><small>${esc(x.l)}</small></div>`}).join('')}</div>`}
function metricWidth(v){let num=String(v).replace(/[^0-9.]/g,'');return Math.max(8,Math.min(100,n(num)%101||55))}
function expiryCount(){let r={ok:0,warn:0,low:0};db.products.forEach(p=>{let s=expiryStatus(p).cls;r[s]=(r[s]||0)+1});return r}
function totalRepTarget(){return db.reps.reduce((a,r)=>a+n(r.target),0)}
function totalRepAchieved(){return db.reps.reduce((a,r)=>a+repAchievement(r.id),0)}
function avgRepPercent(){let t=totalRepTarget();return t?Math.round(totalRepAchieved()/t*100):0}
function repBarData(){let max=Math.max(...db.reps.map(r=>n(r.target)),1);let arr=db.reps.slice(0,4).map(r=>({l:r.name.split(' ')[0]||T('rep'),v:repAchievement(r.id),max:Math.max(n(r.target),max,1)}));return arr.length?arr:[{l:T('reps'),v:0,max:1},{l:T('target'),v:0,max:1},{l:T('sales'),v:0,max:1}]}
function repBarDataFiltered(){let max=Math.max(...db.reps.map(r=>n(r.target)),1);let arr=db.reps.slice(0,4).map(r=>({l:r.name.split(' ')[0]||T('rep'),v:repAchievementFiltered(r.id),max:Math.max(n(r.target),max,1)}));return arr.length?arr:[{l:T('reps'),v:0,max:1},{l:T('target'),v:0,max:1},{l:T('sales'),v:0,max:1}]}

function bigBars(items){let max=Math.max(...items.map(i=>n(i.v)),1);return `<div class="big-bars">${items.map(i=>{let pct=Math.max(8,Math.min(100,Math.round(n(i.v)/max*100)));return `<div class="big-col"><i style="height:${pct}%"></i><b>${esc(i.l)}</b><small>${i.display||money(i.v)}</small></div>`}).join('')}</div>`}
function modalHeader(title,sub){return `<div class="dash-panel-head"><div><h2>${title}</h2><p>${sub}</p></div><div class="actions"><button class="dash-close" onclick="window.print()">${lang==='ar'?'طباعة':'Print'}</button><button class="dash-close" onclick="closeDashboardModal()">${lang==='ar'?'إغلاق':'Close'}</button></div></div>`}
function recentSalesTable(limit=8){let arr=db.sales.slice(0,limit);if(!arr.length)return `<div class="empty">${T('empty')}</div>`;return `<table><tr><th>${T('date')}</th><th>${T('customer')}</th><th>${T('rep')}</th><th>${T('product')}</th><th>${T('total')}</th><th>${T('remaining')}</th></tr>${arr.map(s=>`<tr><td>${esc(s.date)}</td><td>${esc(s.customer_name)}</td><td>${esc(s.rep_name||'')}</td><td>${esc(s.product_name)}</td><td>${money(s.total)}</td><td>${money(s.remaining)}</td></tr>`).join('')}</table>`}
function stockDetailTable(){if(!db.products.length)return `<div class="empty">${T('empty')}</div>`;return `<table><tr><th>${T('product')}</th><th>${T('brand')}</th><th>${T('stock')}</th><th>${T('min')}</th><th>${T('expiry')}</th><th>${T('status')}</th></tr>${db.products.map(p=>{let st=expiryStatus(p);return `<tr><td>${esc(p.name)}</td><td>${esc(p.brand)}</td><td><b>${n(p.stock)}</b></td><td>${n(p.min)}</td><td>${esc(p.expiry||'-')}</td><td><span class="badge ${st.cls}">${st.label}</span></td></tr>`}).join('')}</table>`}
function operationsDetailTable(){if(!db.operations.length)return `<div class="empty">${T('empty')}</div>`;return `<table><tr><th>${T('date')}</th><th>${T('customer')}</th><th>${T('product')}</th><th>${T('rep')}</th><th>${T('qty')}</th><th>${T('total')}</th><th>${T('status')}</th></tr>${db.operations.map(o=>`<tr><td>${esc(o.date)}</td><td>${esc(o.customer_name)}</td><td>${esc(o.product_name)}</td><td>${esc(o.rep_name)}</td><td>${n(o.qty)}</td><td>${money(o.total)}</td><td><span class="badge ${o.status==='sold'?'ok':o.status==='prepared'?'blue':o.status==='cancelled'?'low':'warn'}">${T(o.status)}</span></td></tr>`).join('')}</table>`}
function purchasesDetailTable(){if(!db.purchases.length)return `<div class="empty">${T('empty')}</div>`;return `<table><tr><th>${T('date')}</th><th>${T('supplier')}</th><th>${T('product')}</th><th>${T('qty')}</th><th>${T('total')}</th><th>${T('remaining')}</th></tr>${db.purchases.map(p=>`<tr><td>${esc(p.date)}</td><td>${esc(p.supplier_name)}</td><td>${esc(p.product_name)}</td><td>${n(p.qty)}</td><td>${money(p.total)}</td><td>${money(p.remaining)}</td></tr>`).join('')}</table>`}
function customersDetailTable(){if(!db.customers.length)return `<div class="empty">${T('empty')}</div>`;return `<table><tr><th>${T('customer')}</th><th>${T('phone')}</th><th>${T('type')}</th><th>${T('area')}</th><th>${T('balance')}</th></tr>${db.customers.map(c=>`<tr><td>${esc(c.name)}</td><td>${esc(c.phone)}</td><td>${esc(c.type)}</td><td>${esc(c.area)}</td><td>${money(c.balance)}</td></tr>`).join('')}</table>`}

 let collections=db.collections.reduce((a,c)=>a+n(c.amount),0), sales=totalSales(), purchases=totalPurchases(), debt=customerDebt(), due=supplierDue(), inv=inventoryValue();
 let pending=db.operations.filter(o=>o.status==='requested').length, soldOps=db.operations.filter(o=>o.status==='sold').length, low=db.products.filter(p=>n(p.stock)<=n(p.min)).length, exp=expiryCount();

 if(key==='stock') return `${modalHeader(lang==='ar'?'تفاصيل إدارة المخازن':'Stock department details',lang==='ar'?'قيمة المخزون، الأصناف الناقصة، وتنبيهات الصلاحية':'Inventory value, low stock and expiry alerts')}<div class="dash-panel-body">${expandedStats([[T('inventoryValue'),money(inv)],[T('products'),db.products.length],[T('lowStock'),low],[T('expiryAlert'),exp.warn+exp.low]])}${bigBars([{l:lang==='ar'?'قيمة المخزون':'Inventory value',v:inv},{l:T('lowStock'),v:low,display:low},{l:T('expiryAlert'),v:exp.warn+exp.low,display:exp.warn+exp.low},{l:T('products'),v:db.products.length,display:db.products.length}])}<div class="dash-detail-two"><div class="card"><h3>${T('productList')}</h3>${stockDetailTable()}</div><div class="card"><h3>${T('expiryAlert')}</h3>${expiryTable()}</div></div></div>`;
 if(key==='operations') return `${modalHeader(lang==='ar'?'تفاصيل إدارة العمليات':'Operations department details',lang==='ar'?'طلبات المخزن المطلوبة والمنفذة':'Requested and fulfilled stock operations')}<div class="dash-panel-body">${expandedStats([[T('requested'),pending],[T('sold'),soldOps],[(lang==='ar'?'كل الطلبات':'All orders'),db.operations.length],[T('salesTotal'),money(db.operations.reduce((a,o)=>a+n(o.total),0))]])}${bigBars([{l:T('requested'),v:pending,display:pending},{l:T('sold'),v:soldOps,display:soldOps},{l:lang==='ar'?'إجمالي':'Total',v:db.operations.length,display:db.operations.length}])}<div class="card"><h3>${T('operationList')}</h3>${operationsDetailTable()}</div></div>`;
 if(key==='purchases') return `${modalHeader(lang==='ar'?'تفاصيل إدارة المشتريات':'Purchasing department details',lang==='ar'?'فواتير الشراء، الموردين، والمستحقات':'Purchases, suppliers and dues')}<div class="dash-panel-body">${expandedStats([[T('purchasesTotal'),money(purchases)],[T('supplierDue'),money(due)],[T('suppliers'),db.suppliers.length],[T('purchases'),db.purchases.length]])}${bigBars([{l:T('purchasesTotal'),v:purchases},{l:T('supplierDue'),v:due},{l:T('suppliers'),v:db.suppliers.length,display:db.suppliers.length}])}<div class="card"><h3>${T('purchases')}</h3>${purchasesDetailTable()}</div></div>`;
 if(key==='reps') return `${modalHeader(lang==='ar'?'تفاصيل إدارة البياعين':'Sales reps department details',lang==='ar'?'التارجت، المحقق، ونسبة الإنجاز لكل بياع':'Targets, achieved sales and performance per rep')}<div class="dash-panel-body">${expandedStats([[T('target'),money(totalRepTarget())],[T('achieved'),money(totalRepAchieved())],[T('achievement'),avgRepPercent()+'%'],[T('reps'),db.reps.length]])}${bigBars(db.reps.length?db.reps.map(r=>({l:r.name,v:repAchievement(r.id),display:money(repAchievement(r.id))})): [{l:T('reps'),v:0,display:'0'}])}<div class="dash-detail-two"><div class="card"><h3>${T('reps')}</h3>${repTargetTable()}</div><div class="card"><h3>${T('stockAvailability')}</h3>${stockAvailabilityTable()}</div></div></div>`;
 return `${modalHeader(lang==='ar'?'تفاصيل إدارة العملاء':'Customer management details',lang==='ar'?'العملاء، المديونيات، والتحصيلات':'Customers, debt and collections')}<div class="dash-panel-body">${expandedStats([[T('customers'),db.customers.length],[T('customerDebt'),money(debt)],[T('collections'),db.collections.length],[T('paid'),money(collections)]])}${bigBars([{l:T('customers'),v:db.customers.length,display:db.customers.length},{l:lang==='ar'?'عملاء مديونين':'Debtors',v:db.customers.filter(c=>n(c.balance)>0).length,display:db.customers.filter(c=>n(c.balance)>0).length},{l:T('collections'),v:db.collections.length,display:db.collections.length}])}<div class="dash-detail-two"><div class="card"><h3>${T('customers')}</h3>${customersDetailTable()}</div><div class="card"><h3>${T('customerDebt')}</h3>${customerDebtTable()}</div></div></div>`;

function productForm(){return `<div class="card"><h3>${T('newProduct')}</h3><div class="grid grid5">${inp('pr_code','code')}${inp('pr_name','name')}${inp('pr_brand','brand')}${inp('pr_cat','category')}${inp('pr_purchase','purchasePrice','number')}${inp('pr_sale','salePrice','number')}${inp('pr_stock','stock','number')}${inp('pr_min','min','number')}${inp('pr_exp','expiry','date')}<div style="display:flex;align-items:end"><button class="btn ok" onclick="addProduct()">${T('add')}</button></div></div></div>`}
function renderProducts(){document.getElementById('view-products').innerHTML=productForm()+`<div class="card"><div class="section-title"><h3>${T('warehouseRequests')}</h3><span class="hint">${lang==='ar'?'أي طلب من Operation يظهر هنا لمسؤول المخزن لتجهيزه':'Operation requests appear here for warehouse preparation'}</span></div>${warehouseRequestsTable()}</div><div class="card"><h3>${T('productList')}</h3>${productsTable()}</div>`}
function addProduct(){let row={id:uid(),code:pr_code.value,name:pr_name.value,brand:pr_brand.value,category:pr_cat.value,purchase:n(pr_purchase.value),sale:n(pr_sale.value),stock:n(pr_stock.value),min:n(pr_min.value),expiry:pr_exp.value};if(!row.name)return alert(T('name'));db.products.unshift(row);render()}
function warehouseRequestsTable(){let arr=db.operations.filter(o=>o.status==='requested'||o.status==='prepared');if(!arr.length)return `<div class="empty">${T('empty')}</div>`;return `<table><tr><th>${T('date')}</th><th>${T('customer')}</th><th>${T('product')}</th><th>${T('expiry')}</th><th>${T('qty')}</th><th>${T('rep')}</th><th>${T('availableQty')}</th><th>${T('status')}</th><th></th></tr>${arr.map(o=>{let p=db.products.find(x=>x.id===o.product_id)||{};let st=expiryStatus(p);return `<tr><td>${esc(o.date)}</td><td>${esc(o.customer_name)}</td><td><b>${esc(o.product_name)}</b></td><td>${esc(o.product_expiry||p.expiry||'')}</td><td><b>${n(o.qty)}</b></td><td>${esc(o.rep_name||'')}</td><td>${n(p.stock||0)} <span class="badge ${st.cls}">${st.label}</span></td><td><span class="badge ${o.status==='prepared'?'blue':'warn'}">${T(o.status)}</span></td><td>${o.status==='requested'?`<button class="btn small ok" onclick="prepareOperation('${o.id}')">${T('prepareRequest')}</button>`:''}</td></tr>`}).join('')}</table>`}
function prepareOperation(id){let o=db.operations.find(x=>x.id===id);if(!o)return;o.status='prepared';o.prepared_date=today();render()}
function productsTable(){if(!db.products.length)return `<div class="empty">${T('empty')}</div>`;let fields=[['code','code'],['name','name'],['brand','brand'],['category','category'],['purchase','purchasePrice',1],['sale','salePrice',1],['stock','stock',1],['min','min',1],['expiry','expiry']];return editableTable('products',fields,true)}
function editableTable(table,fields,expiry){if(!db[table].length)return `<div class="empty">${T('empty')}</div>`;return `<table><tr>${fields.map(f=>`<th>${T(f[1])}</th>`).join('')}${expiry?`<th>${T('status')}</th>`:''}<th></th></tr>${db[table].map(r=>{let st=expiry?expiryStatus(r):null;return `<tr>${fields.map(f=>`<td><input ${f[2]?'type="number"':''} value="${esc(r[f[0]]||'')}" onchange="editCell('${table}','${r.id}','${f[0]}',this.value,${!!f[2]})"></td>`).join('')}${expiry?`<td><span class="badge ${st.cls}">${st.label}</span></td>`:''}<td><button class="btn small danger" onclick="del('${table}','${r.id}')">${T('delete')}</button></td></tr>`}).join('')}</table>`}

function simplePage(table,fields,title){let form=fields.map(f=>`<div><label>${T(f[1])}</label><input id="${table}_${f[0]}" ${f[2]?'type="number"':''}></div>`).join('');return `<div class="card"><h3>${title}</h3><div class="grid grid4">${form}<div style="display:flex;align-items:end"><button class="btn ok" onclick="addSimple('${table}')">${T('add')}</button></div></div></div><div class="card"><h3>${T(table)}</h3>${editableTable(table,fields,false)}</div>`}
function addSimple(table){let fs={customers:['name','type','phone','area','address','balance','notes'],suppliers:['name','phone','brand','balance','notes'],reps:['name','phone','area','target','notes']}[table];let row={id:uid()};fs.forEach(f=>row[f]=document.getElementById(table+'_'+f).value);['balance','target'].forEach(f=>{if(row[f]!==undefined)row[f]=n(row[f])});if(!row.name)return alert(T('name'));db[table].unshift(row);render()}

function repTargetTable(){if(!db.reps.length)return `<div class="empty">${T('empty')}</div>`;return `<table><tr><th>${T('rep')}</th><th>${T('target')}</th><th>${T('achieved')}</th><th>${T('remainingTarget')}</th><th>${T('achievement')}</th></tr>${db.reps.map(r=>{let a=repAchievement(r.id),target=n(r.target),pct=target?Math.min(100,Math.round(a/target*100)):0;return `<tr><td>${esc(r.name)}</td><td>${money(target)}</td><td>${money(a)}</td><td>${money(Math.max(target-a,0))}</td><td><div class="progress"><span style="width:${pct}%"></span></div><div class="hint">${pct}%</div></td></tr>`}).join('')}</table>`}

c-sign">${lang==='ar'?'توقيع العميل':'Customer signature'}</div></div><p style="margin-top:24px;color:#64748b;text-align:center">${lang==='ar'?'تم إنشاء المستند من نظام محسوبك Business':'Generated by Mahsoubak Business system'}</p></div></body></html>`}
function printSaleDocument(id,type){let s=db.sales.find(x=>x.id===id);if(!s){alert(lang==='ar'?'لم يتم العثور على الفاتورة':'Sale not found');return}let w=window.open('','_blank','width=1000,height=800');w.document.write(saleDocumentHTML(s,type));w.document.close();w.focus();setTimeout(()=>w.print(),350)}


function renderCollections(){document.getElementById('view-collections').innerHTML=`<div class="card"><h3>${T('collection')}</h3><div class="grid grid4"><div><label>${T('customer')}</label><select id="co_customer">${options(db.customers)}</select></div><div><label>${T('collector')}</label><select id="co_rep">${options(db.reps)}</select></div>${inp('co_amount','amount','number')}<div><label>${T('method')}</label><select id="co_method"><option>Cash</option><option>Bank</option><option>Wallet</option><option>Cheque</option></select></div>${inp('co_notes','notes')}</div><button class="btn ok" style="margin-top:12px" onclick="addCollection()">${T('save')}</button></div><div class="card"><h3>${T('collections')}</h3>${collectionsTable()}</div>`}
function addCollection(){let c=db.customers.find(x=>x.id===co_customer.value),r=db.reps.find(x=>x.id===co_rep.value);if(!c)return;let amount=n(co_amount.value), idv=uid();db.collections.unshift({id:idv,date:today(),customer_id:c.id,customer_name:c.name,rep_id:r?r.id:'',rep_name:r?r.name:'',amount,method:co_method.value,notes:co_notes.value});c.balance=n(c.balance)-amount;postEntry('collection',idv,(lang==='ar'?'تحصيل من ':'Collection from ')+c.name,[{account:'1100',debit:amount},{account:'1200',credit:amount}]);render()}
function collectionsTable(){if(!db.collections.length)return `<div class="empty">${T('empty')}</div>`;return `<table><tr><th>${T('date')}</th><th>${T('customer')}</th><th>${T('collector')}</th><th>${T('amount')}</th><th>${T('method')}</th><th>${T('notes')}</th></tr>${db.collections.map(c=>`<tr><td>${esc(c.date)}</td><td>${esc(c.customer_name)}</td><td>${esc(c.rep_name)}</td><td>${money(c.amount)}</td><td>${esc(c.method)}</td><td>${esc(c.notes)}</td></tr>`).join('')}</table>`}

function renderReports(){document.getElementById('view-reports').innerHTML=`<div class="grid grid3"><div class="card stat"><span>${T('salesTotal')}</span><strong>${money(totalSales())}</strong></div><div class="card stat"><span>${T('customerDebt')}</span><strong>${money(customerDebt())}</strong></div><div class="card stat"><span>${T('inventoryValue')}</span><strong>${money(inventoryValue())}</strong></div></div><div class="card"><h3>${T('reps')}</h3>${repTargetTable()}</div><div class="card"><h3>${T('lowStock')}</h3>${stockAvailabilityTable()}</div>`}

function renderAccounts(){ensureAccounting();let totalDebit=db.journal.reduce((a,j)=>a+n(j.debit),0), totalCredit=db.journal.reduce((a,j)=>a+n(j.credit),0);document.getElementById('view-accounts').innerHTML=`
<div class="grid grid3"><div class="card stat"><span>${lang==='ar'?'إجمالي المدين':'Total debit'}</span><strong>${money(totalDebit)}</strong></div><div class="card stat"><span>${lang==='ar'?'إجمالي الدائن':'Total credit'}</span><strong>${money(totalCredit)}</strong></div><div class="card stat"><span>${lang==='ar'?'فرق الميزان':'Trial balance diff'}</span><strong>${money(Math.abs(totalDebit-totalCredit))}</strong></div></div>
<div class="card"><div class="section-title"><h3>${lang==='ar'?'إضافة حساب جديد':'Add account'}</h3><button class="btn small secondary" onclick="resetAccountsDefault()">${lang==='ar'?'تحميل شجرة افتراضية':'Load default tree'}</button></div><div class="grid grid5"><div><label>${lang==='ar'?'كود الحساب':'Account code'}</label><input id="acc_code" placeholder="مثال 1110"></div><div><label>${lang==='ar'?'اسم الحساب':'Account name'}</label><input id="acc_name"></div><div><label>${lang==='ar'?'نوع الحساب':'Type'}</label><select id="acc_type"><option>Asset</option><option>Liability</option><option>Equity</option><option>Revenue</option><option>Expense</option></select></div><div><label>${lang==='ar'?'تابع لحساب':'Parent code'}</label><input id="acc_parent" placeholder="1000"></div><div><label>${lang==='ar'?'رصيد افتتاحي':'Opening balance'}</label><input id="acc_opening" type="number" value="0"></div></div><button class="btn ok" style="margin-top:12px" onclick="addAccount()">${T('save')}</button></div>
<div class="accounts-layout"><div class="card"><h3>${lang==='ar'?'شجرة الحسابات':'Chart of accounts'}</h3>${accountsTable()}</div><div class="card journal-card journal-wide"><div class="journal-toolbar"><div><h3>${lang==='ar'?'القيود اليومية التلقائية':'Automatic journal entries'}</h3><p style="margin:6px 0 0;color:#64748b">${lang==='ar'?'عرض موسع يوضح البيان والحساب والمدين والدائن لكل حركة':'Expanded view showing description, account, debit and credit for every transaction'}</p></div><div class="actions"><button class="btn blue" onclick="openJournalFullScreen()">${lang==='ar'?'فتح القيود شاشة كاملة':'Open full screen'}</button><button class="btn secondary" onclick="window.print()">${T('print')}</button></div></div>${journalTable()}</div></div><div id="journalScreen" class="journal-screen"><div class="journal-panel"><div class="journal-panel-head"><div class="section-title"><h2>${lang==='ar'?'القيود اليومية - شاشة كاملة':'Journal entries - Full screen'}</h2><div class="actions"><button class="btn secondary" onclick="window.print()">${T('print')}</button><button class="btn danger" onclick="closeJournalFullScreen()">${lang==='ar'?'إغلاق':'Close'}</button></div></div></div>${journalTable()}</div></div>`}
function addAccount(){ensureAccounting();let code=acc_code.value.trim(), name=acc_name.value.trim();if(!code||!name){alert(lang==='ar'?'اكتب كود واسم الحساب':'Enter account code and name');return}if(db.accounts.some(a=>a.code===code)){alert(lang==='ar'?'كود الحساب موجود بالفعل':'Account code already exists');return}let parent=acc_parent.value.trim(), type=acc_type.value;let normal=(type==='Asset'||type==='Expense')?'debit':'credit';let level=parent?((db.accounts.find(a=>a.code===parent)?.level||0)+1):0;db.accounts.push({id:uid(),code,name,type,parent,level,normal,opening:n(acc_opening.value),notes:''});render()}
function resetAccountsDefault(){if(confirm(lang==='ar'?'سيتم استبدال شجرة الحسابات الافتراضية فقط. القيود ستظل موجودة.':'Replace default chart only. Journal entries will remain.')){db.accounts=defaultAccounts();render()}}
function accountsTable(){ensureAccounting();let arr=[...db.accounts].sort((a,b)=>a.code.localeCompare(b.code));return `<table><tr><th>${lang==='ar'?'الكود':'Code'}</th><th>${lang==='ar'?'الحساب':'Account'}</th><th>${lang==='ar'?'النوع':'Type'}</th><th>${lang==='ar'?'الرصيد':'Balance'}</th><th>${lang==='ar'?'تعديل':'Edit'}</th></tr>${arr.map(a=>{let m=accountMovement(a.code);return `<tr class="account-level-${Math.min(n(a.level),2)}"><td class="account-code">${esc(a.code)}</td><td><input value="${esc(a.name)}" onchange="editAccount('${a.id}','name',this.value)"></td><td>${esc(a.type)}</td><td><b>${money(m.balance)}</b></td><td><button class="btn small danger" onclick="deleteAccount('${a.id}')">${T('delete')}</button></td></tr>`}).join('')}</table>`}
function editAccount(id,field,val){let a=db.accounts.find(x=>x.id===id);if(!a)return;a[field]=val;save()}
function deleteAccount(id){let a=db.accounts.find(x=>x.id===id);if(!a)return;if(db.journal.some(j=>j.account===a.code)){alert(lang==='ar'?'لا يمكن حذف حساب عليه قيود':'Cannot delete account with journal entries');return}if(confirm(T('delete')+'?')){db.accounts=db.accounts.filter(x=>x.id!==id);render()}}
function journalTable(){ensureAccounting();if(!db.journal.length)return `<div class="empty">${T('empty')}</div>`;return `<table><tr><th>${T('date')}</th><th>${lang==='ar'?'البيان / الحركة':'Description / transaction'}</th><th>${lang==='ar'?'الحساب المتأثر':'Affected account'}</th><th>${lang==='ar'?'مدين':'Debit'}</th><th>${lang==='ar'?'دائن':'Credit'}</th></tr>${db.journal.slice(0,120).map(j=>`<tr><td><b>${esc(j.date)}</b><span class="entry-source">${esc(j.source||'')}</span></td><td class="journal-desc">${esc(j.description)}<span class="entry-source">${lang==='ar'?'رقم الحركة':'Transaction ID'}: ${esc((j.sourceId||'').slice(-8))}</span></td><td class="journal-account"><span class="account-code">${esc(j.account)}</span><br><b>${esc(accountByCode(j.account).name)}</b></td><td class="journal-amount">${n(j.debit)?`<span class="debit-cell">${money(j.debit)}</span>`:''}</td><td class="journal-amount">${n(j.credit)?`<span class="credit-cell">${money(j.credit)}</span>`:''}</td></tr>`).join('')}</table>`}
function openJournalFullScreen(){let el=document.getElementById('journalScreen');if(el)el.classList.add('show')}
function closeJournalFullScreen(){let el=document.getElementById('journalScreen');if(el)el.classList.remove('show')}


function trialBalanceData(){ensureAccounting();let from=(document.getElementById('tb_from')||{}).value||'', to=(document.getElementById('tb_to')||{}).value||'';let rows=[...db.accounts].sort((a,b)=>a.code.localeCompare(b.code)).map(a=>{let lines=db.journal.filter(j=>j.account===a.code).filter(j=>(!from||j.date>=from)&&(!to||j.date<=to));let debit=lines.reduce((x,j)=>x+n(j.debit),0), credit=lines.reduce((x,j)=>x+n(j.credit),0);let opening=(!from?n(a.opening):0);let balance=opening+(a.normal==='credit'?credit-debit:debit-credit);return {account:a,debit,credit,opening,balance};});return rows}
function renderTrialBalance(){ensureAccounting();let rows=trialBalanceData(), totalDebit=rows.reduce((a,r)=>a+n(r.debit),0), totalCredit=rows.reduce((a,r)=>a+n(r.credit),0), diff=Math.abs(totalDebit-totalCredit);document.getElementById('view-trial').innerHTML=`<div class="card no-print"><div class="section-title"><h3>${T('trial')}</h3><div class="actions"><button class="btn blue" onclick="window.print()">${T('print')}</button><button class="btn secondary" onclick="exportTrialBalanceCSV()">Export CSV</button></div></div><div class="grid grid4"><div><label>${lang==='ar'?'من تاريخ':'From date'}</label><input type="date" id="tb_from" onchange="renderTrialBalance()"></div><div><label>${lang==='ar'?'إلى تاريخ':'To date'}</label><input type="date" id="tb_to" onchange="renderTrialBalance()"></div><div class="stat"><span>${lang==='ar'?'حالة الميزان':'Balance status'}</span><strong>${diff<0.01?(lang==='ar'?'متزن':'Balanced'):(lang==='ar'?'غير متزن':'Unbalanced')}</strong></div><div class="stat"><span>${lang==='ar'?'فرق الميزان':'Difference'}</span><strong>${money(diff)}</strong></div></div></div><div class="grid grid3"><div class="card stat"><span>${lang==='ar'?'إجمالي المدين':'Total debit'}</span><strong>${money(totalDebit)}</strong></div><div class="card stat"><span>${lang==='ar'?'إجمالي الدائن':'Total credit'}</span><strong>${money(totalCredit)}</strong></div><div class="card stat"><span>${lang==='ar'?'عدد الحسابات':'Accounts count'}</span><strong>${rows.length}</strong></div></div><div class="card"><h3>${T('trial')}</h3>${trialBalanceTable(rows)}</div><div class="card"><h3>${lang==='ar'?'تفاصيل القيود':'Journal details'}</h3>${journalTable()}</div>`}
function trialBalanceTable(rows){return `<table><tr><th>${lang==='ar'?'كود الحساب':'Code'}</th><th>${lang==='ar'?'اسم الحساب':'Account'}</th><th>${lang==='ar'?'افتتاحي':'Opening'}</th><th>${lang==='ar'?'مدين':'Debit'}</th><th>${lang==='ar'?'دائن':'Credit'}</th><th>${lang==='ar'?'الرصيد':'Balance'}</th><th>${lang==='ar'?'طبيعة الرصيد':'Nature'}</th></tr>${rows.map(r=>`<tr><td class="account-code">${esc(r.account.code)}</td><td>${esc(r.account.name)}</td><td>${money(r.opening)}</td><td>${money(r.debit)}</td><td>${money(r.credit)}</td><td><b>${money(Math.abs(r.balance))}</b></td><td><span class="badge ${r.balance>=0?'blue':'warn'}">${r.balance>=0?(r.account.normal==='credit'?(lang==='ar'?'دائن':'Credit'):(lang==='ar'?'مدين':'Debit')):(r.account.normal==='credit'?(lang==='ar'?'مدين':'Debit'):(lang==='ar'?'دائن':'Credit'))}</span></td></tr>`).join('')}</table>`}
function exportTrialBalanceCSV(){let rows=trialBalanceData();let csv='\ufeff'+[[lang==='ar'?'كود الحساب':'Code',lang==='ar'?'اسم الحساب':'Account',lang==='ar'?'افتتاحي':'Opening',lang==='ar'?'مدين':'Debit',lang==='ar'?'دائن':'Credit',lang==='ar'?'الرصيد':'Balance'],...rows.map(r=>[r.account.code,r.account.name,r.opening,r.debit,r.credit,r.balance])].map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(',')).join('\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));a.download='trial_balance.csv';a.click()}

function renderSettings(){document.getElementById('view-settings').innerHTML=`<div class="card"><h3>${T('settings')}</h3><div class="grid grid2"><div><label>${T('companyName')}</label><input id="set_company" value="${esc(db.settings.company)}"></div><div><label>${T('systemSubtitle')}</label><input id="set_subtitle" value="${esc(db.settings.subtitle)}"></div></div><button class="btn ok" style="margin-top:12px" onclick="db.settings.company=set_company.value;db.settings.subtitle=set_subtitle.value;save();alert(T('settingsSaved'));render()">${T('save')}</button></div><div class="card"><h3>${T('resetLocal')}</h3><button class="btn danger" onclick="if(confirm(T('delete')+'?')){db=seed();render()}">${T('resetLocal')}</button></div>`}
render();

<script>

function render(){
  document.documentElement.lang=lang;

}

function gridDashboardHeader(){
  return `<div class="market-hero"><div><div class="market-kicker">${lang==='ar'?'':''}</div><h3>${lang==='ar'?'':''}</h3><p>${lang==='ar'?'':''}</p></div><div class="market-legend"><span><i style="background:#2563eb"></i>${lang==='ar'?'مبيعات':'Sales'}</span><span><i style="background:#16a34a"></i>${lang==='ar'?'مخزون':'Stock'}</span><span><i style="background:#7c3aed"></i>${lang==='ar'?'عمليات':'Operations'}</span></div></div>`;
}
function shortDateLabel(d){if(!d)return '-'; let x=new Date(d); if(String(x)==='Invalid Date') return String(d).slice(5); return String(x.getDate()).padStart(2,'0')+'/'+String(x.getMonth()+1).padStart(2,'0')}
function simpleBarsFromTotals(items, fallbackLabel){if(!items.length)return [{l:fallbackLabel||'-',v:0,max:1}]; let max=Math.max(...items.map(i=>n(i.v)),1); return items.map(i=>({l:i.l,v:n(i.v),max}));}
function salesCardBars(){let arr=filteredSales().slice(0,4).reverse().map(s=>({l:shortDateLabel(s.date),v:n(s.total)})); return simpleBarsFromTotals(arr,lang==='ar'?'بيع':'Sale')}
function purchaseCardBars(){let arr=filteredPurchases().slice(0,4).reverse().map(p=>({l:shortDateLabel(p.date),v:n(p.total)})); return simpleBarsFromTotals(arr,lang==='ar'?'شراء':'Buy')}
function stockCardBars(){let arr=[...db.products].sort((a,b)=>n(b.stock)-n(a.stock)).slice(0,4).map(p=>({l:(p.name||'').split(' ')[0]||T('product'),v:n(p.stock)})); return simpleBarsFromTotals(arr,lang==='ar'?'صنف':'Item')}
function repsCardBars(){let max=Math.max(...db.reps.map(r=>Math.max(n(r.target),repAchievementFiltered(r.id))),1); let arr=db.reps.slice(0,4).map(r=>({l:(r.name||'').split(' ')[0]||T('rep'),v:repAchievementFiltered(r.id),max})); return arr.length?arr:[{l:T('reps'),v:0,max:1}]}
function customersCardBars(){let arr=[...db.customers].sort((a,b)=>n(b.balance)-n(a.balance)).slice(0,4).map(c=>({l:(c.name||'').split(' ')[0]||T('customer'),v:n(c.balance)})); return simpleBarsFromTotals(arr,lang==='ar'?'عميل':'Customer')}
function pendingOpsCount(){return filteredOperations().filter(o=>o.status==='requested').length}
function preparedOpsCount(){return filteredOperations().filter(o=>o.status==='prepared').length}
function soldOpsCount(){return filteredOperations().filter(o=>o.status==='sold').length}
function cancelledOpsCount(){return filteredOperations().filter(o=>o.status==='cancelled').length}
function operationsCardBars(){let arr=[{l:T('requested'),v:pendingOpsCount()},{l:T('prepared'),v:preparedOpsCount()},{l:T('sold'),v:soldOpsCount()},{l:T('cancelled'),v:cancelledOpsCount()}]; return simpleBarsFromTotals(arr,lang==='ar'?'حالة':'Status')}

function renderDashboard(){
  let fs=filteredSales(), fp=filteredPurchases(), fc=filteredCollections(), fo=filteredOperations();
  let pending=fo.filter(o=>o.status==='requested').length, prepared=fo.filter(o=>o.status==='prepared').length, soldOps=fo.filter(o=>o.status==='sold').length;
  let low=db.products.filter(p=>n(p.stock)<=n(p.min)).length, collections=fc.reduce((a,c)=>a+n(c.amount),0), exp=expiryCount();
  let sales=fs.reduce((a,s)=>a+n(s.total),0), purchases=fp.reduce((a,s)=>a+n(s.total),0), debt=customerDebt(), due=supplierDue(), inv=inventoryValue();
  document.getElementById('view-dashboard').innerHTML = gridDashboardHeader() + `
  <div class="dashboard-grid market-dashboard-grid">
    ${dashboardBox('sales',lang==='ar'?'المبيعات':'Sales',lang==='ar'?'أداء البيع والتحصيل خلال الفترة':'Sales and collections during selected period',money(sales),salesCardBars(),[[lang==='ar'?'التحصيل':'Collections',money(collections)],[lang==='ar'?'الفواتير':'Invoices',fs.length],[lang==='ar'?'متوسط الفاتورة':'Avg invoice',money(fs.length?Math.round(sales/fs.length):0)]])}
    ${dashboardBox('purchases',lang==='ar'?'المشتريات':'Purchases',lang==='ar'?'قيمة الشراء ومستحقات الموردين':'Purchasing volume and supplier dues',money(purchases),purchaseCardBars(),[[lang==='ar'?'مستحقات الموردين':'Supplier due',money(due)],[lang==='ar'?'فواتير الشراء':'Purchase invoices',fp.length],[lang==='ar'?'متوسط الشراء':'Avg purchase',money(fp.length?Math.round(purchases/fp.length):0)]])}
    ${dashboardBox('stock',lang==='ar'?'المخزون':'Inventory',lang==='ar'?'الكميات المتاحة والتنبيهات':'Available stock and alerts',money(inv),stockCardBars(),[[lang==='ar'?'أصناف متاحة':'Available items',db.products.length],[lang==='ar'?'أصناف ناقصة':'Low stock',low],[lang==='ar'?'تنبيهات الصلاحية':'Expiry alerts',exp.warn+exp.low]])}
    ${dashboardBox('operations',lang==='ar'?'العمليات':'Operations',lang==='ar'?'طلبات المخزن وحالة التنفيذ':'Warehouse requests and fulfillment status',fo.length,operationsCardBars(),[[lang==='ar'?'مطلوب':'Requested',pending],[lang==='ar'?'تم التجهيز':'Prepared',prepared],[lang==='ar'?'تم البيع':'Sold',soldOps]])}
    ${dashboardBox('reps',lang==='ar'?'البياعين':'Sales reps',lang==='ar'?'التارجت وتحقيق الفترة':'Target versus achieved sales',avgRepPercentFiltered()+'%',repsCardBars(),[[lang==='ar'?'إجمالي التارجت':'Total target',money(totalRepTarget())],[lang==='ar'?'المحقق بالفترة':'Achieved in period',money(totalRepAchievedFiltered())],[lang==='ar'?'عدد البياعين':'Rep count',db.reps.length]])}
    ${dashboardBox('customers',lang==='ar'?'مديونيات العملاء':'Customer debt',lang==='ar'?'المديونيات والتحصيلات والعملاء النشطون':'Debt, collections and active customers',money(debt),customersCardBars(),[[lang==='ar'?'التحصيلات':'Collections',money(collections)],[lang==='ar'?'عملاء مديونون':'Debtors',db.customers.filter(c=>n(c.balance)>0).length],[lang==='ar'?'إجمالي العملاء':'Total customers',db.customers.length]])}
  </div>

  <div class="clean-dashboard-sections no-print">
    <details class="erp-details" open>
      <summary>${lang==='ar'?'تقارير الفترة والطباعة':'Period reports and export'}</summary>
      <div class="details-body">${dashboardRangeControls()}</div>
    </details>
    <details class="erp-details">
      <summary>${lang==='ar'?'تفاصيل تشغيلية: البياعين / المخزون / المديونيات / الصلاحية':'Operational details: reps / stock / debts / expiry'}</summary>
      <div class="details-body insight-grid clean-insights">
        <div class="insight-card insight-reps"><div class="section-title"><h3>${T('reps')}</h3><button class="btn small secondary" onclick="show('reps')">${T('reps')}</button></div>${repTargetTable()}</div>
        <div class="insight-card insight-stock"><div class="section-title"><h3>${T('stockAvailability')}</h3><button class="btn small secondary" onclick="show('products')">${T('products')}</button></div>${stockAvailabilityTable()}</div>
        <div class="insight-card insight-debt"><div class="section-title"><h3>${T('customerDebt')}</h3><button class="btn small secondary" onclick="show('customers')">${T('customers')}</button></div>${customerDebtTable()}</div>
        <div class="insight-card insight-expiry"><div class="section-title"><h3>${T('expiryAlert')}</h3><button class="btn small secondary" onclick="show('products')">${T('products')}</button></div>${expiryTable()}</div>
      </div>
    </details>
  </div>`;
}

render();
</script>

<script>
function exchangeTrend(arr){
  if(!arr||arr.length<2) return {dir:'flat',icon:'●',txt:lang==='ar'?'مستقر':'Stable'};
  let a=n(arr[arr.length-2].v), b=n(arr[arr.length-1].v);
  if(b>a) return {dir:'up',icon:'▲',txt:lang==='ar'?'صعود':'Up'};
  if(b<a) return {dir:'down',icon:'▼',txt:lang==='ar'?'هبوط':'Down'};
  return {dir:'flat',icon:'●',txt:lang==='ar'?'مستقر':'Stable'};
}
function exchangeCode(key){
  return ({sales:'SALES',stock:'STOCK',customers:'DEBT',operations:'OPS',reps:'TARGET',purchases:'BUY'})[key]||'KPI';
}
function candleBars(arr){
  if(!arr || !arr.length) arr=[{l:'-',v:0,max:1},{l:'-',v:0,max:1},{l:'-',v:0,max:1},{l:'-',v:0,max:1}];
  let out = arr.slice(-5);
  let max = Math.max(...out.map(x=>n(x.max)||n(x.v)),1);
  return `<div class="candle-chart">${out.map((x,i)=>{
    let pct=Math.max(12,Math.min(100,Math.round(n(x.v)/max*100)));
    let cls = i>0 && n(x.v)<n(out[i-1].v) ? 'down' : 'up';
    return `<div class="candle ${cls}"><i style="height:${pct}%"></i><small>${esc(x.l)}</small></div>`;
  }).join('')}</div>`;
}
function dashboardBox(key,title,label,value,bars,metrics){
  let hint=lang==='ar'?'فتح شاشة التفاصيل':'Open details';
  let tr=exchangeTrend(bars);
  return `<div class="dash-card dash-${key}" onclick="openDashboardCard('${key}')">
    <div class="exchange-head">
      <div><span class="exchange-code">${exchangeCode(key)}</span><div class="dash-title" style="margin-top:10px">${title}</div><div class="dash-sub">${label}</div></div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:9px"><div class="dash-value">${value}</div><span class="exchange-trend ${tr.dir}">${tr.icon} ${tr.txt}</span></div>
    </div>
    ${candleBars(bars)}
    <div class="metric-list">${metrics.map(m=>`<div class="metric-row"><span>${m[0]}</span><b>${m[1]}</b><div class="mini-progress"><span style="width:${metricWidth(m[1])}%"></span></div></div>`).join('')}</div>
    <div class="open-hint">${hint}</div>
  </div>`;
}
function tickerTape(sales, inv, debt, pending, achieved, purchases){
  let cells=[
    ['SALES',money(sales),'up'],['STOCK',money(inv),'up'],['DEBT',money(debt),'down'],
    ['OPS',pending,'flat'],['TARGET',achieved+'%','up'],['BUY',money(purchases),'flat']
  ];
  return `<div class="market-ticker">${cells.map(c=>`<span class="ticker-item ${c[2]}"><b>${c[0]}</b> ${c[1]} <em>${c[2]==='up'?'▲':c[2]==='down'?'▼':'●'}</em></span>`).join('')}</div>`;
}
function renderDashboard(){
  let fs=filteredSales(), fp=filteredPurchases(), fc=filteredCollections(), fo=filteredOperations();

  document.getElementById('view-dashboard').innerHTML =
  tickerTape(sales,inv,debt,pending,avgRepPercentFiltered(),purchases) + gridDashboardHeader() + `
  <div class="dashboard-grid market-dashboard-grid">
    ${dashboardBox('sales',lang==='ar'?'المبيعات':'Sales',lang==='ar'?'حركة البيع مثل مؤشر السوق':'Sales movement like a market index',money(sales),salesCardBars(),[[lang==='ar'?'التحصيل':'Collections',money(collections)],[lang==='ar'?'الفواتير':'Invoices',fs.length],[lang==='ar'?'متوسط الفاتورة':'Avg invoice',money(fs.length?Math.round(sales/fs.length):0)]])}
    ${dashboardBox('stock',lang==='ar'?'المخزون':'Inventory',lang==='ar'?'مؤشر قيمة وكميات المخزون':'Inventory value and quantities index',money(inv),stockCardBars(),[[lang==='ar'?'أصناف متاحة':'Available items',db.products.length],[lang==='ar'?'أصناف ناقصة':'Low stock',low],[lang==='ar'?'تنبيهات الصلاحية':'Expiry alerts',exp.warn+exp.low]])}
    ${dashboardBox('customers',lang==='ar'?'مديونيات العملاء':'Customer debt',lang==='ar'?'مؤشر المخاطر والتحصيل':'Risk and collection index',money(debt),customersCardBars(),[[lang==='ar'?'التحصيلات':'Collections',money(collections)],[lang==='ar'?'عملاء مديونون':'Debtors',db.customers.filter(c=>n(c.balance)>0).length],[lang==='ar'?'إجمالي العملاء':'Total customers',db.customers.length]])}
    ${dashboardBox('operations',lang==='ar'?'العمليات':'Operations',lang==='ar'?'حركة الطلبات والتنفيذ':'Request and fulfillment movement',fo.length,operationsCardBars(),[[lang==='ar'?'مطلوب':'Requested',pending],[lang==='ar'?'تم التجهيز':'Prepared',prepared],[lang==='ar'?'تم البيع':'Sold',soldOps]])}
    ${dashboardBox('reps',lang==='ar'?'البياعين':'Sales reps',lang==='ar'?'مؤشر تحقيق التارجت':'Target achievement index',avgRepPercentFiltered()+'%',repsCardBars(),[[lang==='ar'?'إجمالي التارجت':'Total target',money(totalRepTarget())],[lang==='ar'?'المحقق بالفترة':'Achieved in period',money(totalRepAchievedFiltered())],[lang==='ar'?'عدد البياعين':'Rep count',db.reps.length]])}
    ${dashboardBox('purchases',lang==='ar'?'المشتريات':'Purchases',lang==='ar'?'مؤشر تكلفة التوريد':'Supply cost index',money(purchases),purchaseCardBars(),[[lang==='ar'?'مستحقات الموردين':'Supplier due',money(due)],[lang==='ar'?'فواتير الشراء':'Purchase invoices',fp.length],[lang==='ar'?'متوسط الشراء':'Avg purchase',money(fp.length?Math.round(purchases/fp.length):0)]])}
  </div>
  <div class="clean-dashboard-sections no-print">
    <details class="erp-details" open>
      <summary>${lang==='ar'?'تقارير الفترة والطباعة':'Period reports and export'}</summary>
      <div class="details-body">${dashboardRangeControls()}</div>
    </details>
    <details class="erp-details">

      <div class="details-body insight-grid clean-insights">
        <div class="insight-card insight-reps"><div class="section-title"><h3>${T('reps')}</h3><button class="btn small secondary" onclick="show('reps')">${T('reps')}</button></div>${repTargetTable()}</div>
        <div class="insight-card insight-stock"><div class="section-title"><h3>${T('stockAvailability')}</h3><button class="btn small secondary" onclick="show('products')">${T('products')}</button></div>${stockAvailabilityTable()}</div>
        <div class="insight-card insight-debt"><div class="section-title"><h3>${T('customerDebt')}</h3><button class="btn small secondary" onclick="show('customers')">${T('customers')}</button></div>${customerDebtTable()}</div>
        <div class="insight-card insight-expiry"><div class="section-title"><h3>${T('expiryAlert')}</h3><button class="btn small secondary" onclick="show('products')">${T('products')}</button></div>${expiryTable()}</div>

}

<script>
/* v8.0 Supplier invoice fields + attachment */
function supplierInvoiceLabel(k){
  const ar={
    invoice_no:'رقم الفاتورة',
    invoice_date:'تاريخ الفاتورة',
    invoice_attach:'Attach Invoice',
    view_invoice:'فتح الفاتورة',
    no_invoice:'لا يوجد مرفق',
    replace_invoice:'تغيير المرفق',
    attach_hint:'PDF / صورة الفاتورة - يفضل ملف صغير في النسخة Offline'
  };
  const en={
    invoice_no:'Invoice No.',
    invoice_date:'Invoice Date',
    invoice_attach:'Attach invoice',
    view_invoice:'Open invoice',
    no_invoice:'No attachment',
    replace_invoice:'Replace attachment',
    attach_hint:'PDF / invoice image - small file recommended in offline version'
  };
  return (lang==='ar'?ar:en)[k]||k;
}
function fileToDataURL(file){
  return new Promise((resolve,reject)=>{
    if(!file) return resolve(null);
    const reader=new FileReader();
    reader.onload=()=>resolve({name:file.name,type:file.type||'application/octet-stream',data:reader.result,size:file.size});
    reader.onerror=()=>reject(reader.error);
    reader.readAsDataURL(file);
  });
}
async function addSupplier(){
  let file=(document.getElementById('suppliers_invoice_file')||{}).files?.[0]||null;
  let attach=null;
  if(file){
    if(file.size>2.5*1024*1024){
      alert(lang==='ar'?'حجم المرفق كبير. في النسخة Offline يفضل أقل من 2.5MB':'Attachment is too large. For offline version keep it under 2.5MB');
      return;
    }
    attach=await fileToDataURL(file);
  }
  let row={
    id:uid(),
    name:(document.getElementById('suppliers_name')||{}).value||'',
    phone:(document.getElementById('suppliers_phone')||{}).value||'',
    brand:(document.getElementById('suppliers_brand')||{}).value||'',
    invoice_no:(document.getElementById('suppliers_invoice_no')||{}).value||'',
    invoice_date:(document.getElementById('suppliers_invoice_date')||{}).value||today(),
    balance:n((document.getElementById('suppliers_balance')||{}).value),
    notes:(document.getElementById('suppliers_notes')||{}).value||'',
    invoice_file:attach
  };
  if(!row.name)return alert(T('name'));
  db.suppliers.unshift(row);
  render();
}
function supplierAttachmentCell(s){
  if(!s.invoice_file||!s.invoice_file.data){
    return `<span class="attach-empty">${supplierInvoiceLabel('no_invoice')}</span>`;
  }
  return `<a class="attach-link" href="${s.invoice_file.data}" target="_blank" download="${esc(s.invoice_file.name||'invoice')}">📎 ${supplierInvoiceLabel('view_invoice')}</a><div class="hint">${esc(s.invoice_file.name||'')}</div>`;
}
async function replaceSupplierInvoice(id,input){
  let file=input.files&&input.files[0];
  if(!file)return;
  if(file.size>2.5*1024*1024){
    alert(lang==='ar'?'حجم المرفق كبير. في النسخة Offline يفضل أقل من 2.5MB':'Attachment is too large. For offline version keep it under 2.5MB');
    input.value='';
    return;
  }
  let s=db.suppliers.find(x=>x.id===id);
  if(!s)return;
  s.invoice_file=await fileToDataURL(file);
  save();
  renderSuppliers();
}
function renderSuppliers(){
  let el=document.getElementById('view-suppliers');
  if(!el)return;
  let rows=db.suppliers.length?`<table>
    <tr>
      <th>${T('name')}</th>
      <th>${T('phone')}</th>
      <th>${T('brand')}</th>
      <th>${supplierInvoiceLabel('invoice_no')}</th>
      <th>${supplierInvoiceLabel('invoice_date')}</th>
      <th>${T('balance')}</th>
      <th>${supplierInvoiceLabel('invoice_attach')}</th>
      <th>${T('notes')}</th>
      <th></th>
    </tr>
    ${db.suppliers.map(s=>`<tr>
      <td><input value="${esc(s.name||'')}" onchange="editCell('suppliers','${s.id}','name',this.value,false)"></td>
      <td><input value="${esc(s.phone||'')}" onchange="editCell('suppliers','${s.id}','phone',this.value,false)"></td>
      <td><input value="${esc(s.brand||'')}" onchange="editCell('suppliers','${s.id}','brand',this.value,false)"></td>
      <td><input value="${esc(s.invoice_no||'')}" onchange="editCell('suppliers','${s.id}','invoice_no',this.value,false)"></td>
      <td><input type="date" value="${esc(s.invoice_date||'')}" onchange="editCell('suppliers','${s.id}','invoice_date',this.value,false)"></td>
      <td><input type="number" value="${esc(s.balance||0)}" onchange="editCell('suppliers','${s.id}','balance',this.value,true)"></td>
      <td>${supplierAttachmentCell(s)}<div style="margin-top:8px"><input class="supplier-file-input" type="file" accept="image/*,.pdf" onchange="replaceSupplierInvoice('${s.id}',this)"></div></td>
      <td><input value="${esc(s.notes||'')}" onchange="editCell('suppliers','${s.id}','notes',this.value,false)"></td>
      <td><button class="btn small danger" onclick="del('suppliers','${s.id}')">${T('delete')}</button></td>
    </tr>`).join('')}
  </table>`:`<div class="empty">${T('empty')}</div>`;
  el.innerHTML=`<div class="card">
    <h3>${T('newSupplier')}</h3>
    <div class="grid grid4">
      <div><label>${T('name')}</label><input id="suppliers_name"></div>
      <div><label>${T('phone')}</label><input id="suppliers_phone"></div>
      <div><label>${T('brand')}</label><input id="suppliers_brand"></div>
      <div><label>${supplierInvoiceLabel('invoice_no')}</label><input id="suppliers_invoice_no"></div>
      <div><label>${supplierInvoiceLabel('invoice_date')}</label><input id="suppliers_invoice_date" type="date" value="${today()}"></div>
      <div><label>${T('balance')}</label><input id="suppliers_balance" type="number" value="0"></div>
      <div class="invoice-attach-box"><label>${supplierInvoiceLabel('invoice_attach')}</label><input id="suppliers_invoice_file" type="file" accept="image/*,.pdf"><div class="hint">${supplierInvoiceLabel('attach_hint')}</div></div>
      <div><label>${T('notes')}</label><input id="suppliers_notes"></div>
      <div style="display:flex;align-items:end"><button class="btn ok" onclick="addSupplier()">${T('add')}</button></div>
    </div>
  </div>
  <div class="card"><h3>${T('suppliers')}</h3>${rows}</div>`;
}
render();
</script>

/* v8.1 Regions module */
const REGION_SEED=[
  {id:'region_zayed_1',name_ar:'زايد 1',name_en:'Zayed 1',color:'#2563eb',x:25,y:28},
  {id:'region_zayed_2',name_ar:'زايد 2',name_en:'Zayed 2',color:'#7c3aed',x:35,y:67},
  {id:'region_new_cairo',name_ar:'القاهرة الجديدة',name_en:'New Cairo',color:'#0f766e',x:70,y:30},
  {id:'region_heliopolis',name_ar:'مصر الجديدة',name_en:'Heliopolis',color:'#f97316',x:73,y:72}
];
let selectedRegionId=localStorage.getItem('mb_selected_region')||'region_zayed_1';
let regionPanelOpen=false;
function detectRegionId(area){
  let a=String(area||'').toLowerCase().replace(/[\s_-]+/g,'');
  if(a.includes('زايد1')||a.includes('zayed1')||a.includes('sheikhzayed1'))return 'region_zayed_1';
  if(a.includes('زايد2')||a.includes('zayed2')||a.includes('sheikhzayed2'))return 'region_zayed_2';
  if(a.includes('القاهرةالجديدة')||a.includes('التجمع')||a.includes('newcairo'))return 'region_new_cairo';
  if(a.includes('مصرالجديدة')||a.includes('heliopolis'))return 'region_heliopolis';
  return '';
}
function ensureRegions(){
  if(!Array.isArray(db.regions)||!db.regions.length)db.regions=REGION_SEED.map(x=>({...x}));
  if(!Array.isArray(db.visits))db.visits=[];
  db.customers.forEach(c=>{if(!c.region_id)c.region_id=detectRegionId(c.area)});
  db.reps.forEach(r=>{if(!r.region_id)r.region_id=detectRegionId(r.area)});
}
function regionName(r){return lang==='ar'?r.name_ar:r.name_en}
function entityRegionId(row){return row.region_id||detectRegionId(row.area)}
function transactionRegionId(row){if(row.region_id)return row.region_id;let customer=db.customers.find(c=>c.id===row.customer_id);return customer?entityRegionId(customer):''}
function regionCustomers(id){return db.customers.filter(c=>entityRegionId(c)===id)}
function regionReps(id){let result=new Map();db.reps.filter(r=>entityRegionId(r)===id).forEach(r=>result.set(r.id,r));[...db.operations,...db.sales].filter(row=>transactionRegionId(row)===id).forEach(row=>{if(!row.rep_id&&!row.rep_name)return;let rep=db.reps.find(r=>r.id===row.rep_id)||{id:row.rep_id||('rep_'+row.rep_name),name:row.rep_name,phone:'',area:'',target:0,from_activity:true};result.set(rep.id,rep)});return [...result.values()]}
function regionVisits(id){
  let customerIds=new Set(regionCustomers(id).map(c=>c.id)),seen=new Set(),rows=[];
  function pushVisit(v){let key=[v.date,v.customer_id||v.customer_name,v.rep_id||v.rep_name].join('|');if(seen.has(key))return;seen.add(key);rows.push(v)}
  db.visits.filter(v=>v.region_id?v.region_id===id:customerIds.has(v.customer_id)).forEach(v=>pushVisit({...v,source:'visit'}));
  db.operations.filter(o=>transactionRegionId(o)===id).forEach(o=>pushVisit({id:'op_'+o.id,date:o.date,customer_id:o.customer_id,customer_name:o.customer_name,rep_id:o.rep_id,rep_name:o.rep_name,result:T(o.status),notes:o.product_name,source:'operation'}));
  db.sales.filter(s=>transactionRegionId(s)===id).forEach(s=>pushVisit({id:'sale_'+s.id,date:s.date,customer_id:s.customer_id,customer_name:s.customer_name,rep_id:s.rep_id,rep_name:s.rep_name,result:lang==='ar'?'زيارة بيع':'Sales visit',notes:s.product_name,source:'sale'}));
  return rows.sort((a,b)=>String(b.date).localeCompare(String(a.date)));
}
function regionSales(id){return db.sales.filter(s=>transactionRegionId(s)===id)}
function regionProducts(id){let rows={};regionSales(id).forEach(s=>{let k=s.product_name||T('product');if(!rows[k])rows[k]={name:k,qty:0,total:0};rows[k].qty+=n(s.qty);rows[k].total+=n(s.total)});return Object.values(rows).sort((a,b)=>b.qty-a.qty)}
function regionSelectOptions(selected){return db.regions.map(r=>`<option value="${r.id}" ${r.id===selected?'selected':''}>${esc(regionName(r))}</option>`).join('')}
function setEntityRegion(table,id,regionId){let row=db[table].find(x=>x.id===id);if(!row)return;row.region_id=regionId;save();renderRegions();refreshRegionModal()}
function regionModalHTML(r){let title=`<span class="region-modal-dot" style="--region-color:${r.color}"></span>${esc(regionName(r))}`;let sub=lang==='ar'?'العملاء والبياعين والزيارات والمنتجات المباعة داخل المنطقة':'Customers, sales reps, visits and products sold in this region';return `${modalHeader(title,sub)}<div class="dash-panel-body region-dashboard-modal">${regionDetail(r)}</div>`}
function openRegionDashboard(id){let r=db.regions.find(x=>x.id===id);if(!r)return;selectedRegionId=id;localStorage.setItem('mb_selected_region',id);document.getElementById('dashModalContent').innerHTML=regionModalHTML(r);document.getElementById('dashModal').classList.add('show');document.body.classList.add('modal-open')}
function refreshRegionModal(){let modal=document.getElementById('dashModal');if(!modal||!modal.classList.contains('show'))return;let r=db.regions.find(x=>x.id===selectedRegionId);if(r)document.getElementById('dashModalContent').innerHTML=regionModalHTML(r)}
function selectRegion(id){selectedRegionId=id;regionPanelOpen=false;localStorage.setItem('mb_selected_region',id);renderRegions();openRegionDashboard(id)}
function closeRegionPanel(){regionPanelOpen=false;renderRegions()}
function addVisit(){
  let region=db.regions.find(r=>r.id===selectedRegionId),customer=db.customers.find(c=>c.id===visit_customer.value),rep=db.reps.find(r=>r.id===visit_rep.value);
  if(!region||!customer||!rep){alert(lang==='ar'?'اختر العميل والبياع':'Choose customer and sales rep');return}
  db.visits.unshift({id:uid(),date:visit_date.value||today(),region_id:region.id,customer_id:customer.id,customer_name:customer.name,rep_id:rep.id,rep_name:rep.name,result:visit_result.value,notes:visit_notes.value});
  save();renderRegions();refreshRegionModal();
}
function deleteVisit(id){if(!confirm(T('delete')+'?'))return;db.visits=db.visits.filter(v=>v.id!==id);save();renderRegions();refreshRegionModal()}
function regionMap(){return `<div class="coverage-map"><div class="map-label"><b>${lang==='ar'?'خريطة التغطية':'Coverage map'}</b><small>${lang==='ar'?'اضغط على نقطة لفتح المنطقة':'Select a pin to open its area'}</small></div><div class="map-road r1"></div><div class="map-road r2"></div><div class="map-road r3"></div>${db.regions.map(r=>`<button class="map-pin ${r.id===selectedRegionId?'active':''}" style="left:${r.x}%;top:${r.y}%;--pin:${r.color}" onclick="selectRegion('${r.id}')"><span class="map-pin-dot"></span><span class="map-pin-name">${esc(regionName(r))}</span><span class="map-pin-count">${regionVisits(r.id).length} ${lang==='ar'?'زيارة':'visits'}</span></button>`).join('')}</div>`}
function regionCards(){return `<div class="region-list">${db.regions.map(r=>{let cs=regionCustomers(r.id),rs=regionReps(r.id),vs=regionVisits(r.id);return `<div class="region-card ${r.id===selectedRegionId?'active':''}" style="--region-color:${r.color}" onclick="selectRegion('${r.id}')"><div class="region-bullet">⌖</div><div><h4>${esc(regionName(r))}</h4><p>${cs.length} ${lang==='ar'?'عميل':'customers'} · ${rs.length} ${lang==='ar'?'بياع':'reps'} · ${vs.length} ${lang==='ar'?'زيارة':'visits'}</p></div><div class="region-arrow">←</div></div>`}).join('')}</div>`}
function personInitials(name){return String(name||'?').trim().split(/\s+/).slice(0,2).map(x=>x[0]||'').join('').toUpperCase()}
function rosterCard(title,rows,type,r){return `<div class="roster-card"><div class="roster-head"><h4>${title}</h4><span class="roster-count">${rows.length}</span></div><div class="roster-list">${rows.length?rows.map(x=>`<div class="roster-person"><span class="roster-avatar">${esc(personInitials(x.name))}</span><span>${esc(x.name)}</span></div>`).join(''):`<div class="empty" style="grid-column:1/-1;padding:12px">${type==='customer'?(lang==='ar'?'لا يوجد عملاء معينون':'No assigned customers'):(lang==='ar'?'لا يوجد بياعون معينون':'No assigned reps')}</div>`}</div></div>`}
function repVisitBars(reps,visits){if(!reps.length)return '';let countFor=r=>visits.filter(v=>(r.id&&v.rep_id===r.id)||v.rep_name===r.name).length,max=Math.max(...reps.map(countFor),1);return `<div class="rep-visit-bars">${reps.map(r=>{let count=countFor(r);return `<div class="rep-visit-row"><span>${esc(r.name)}</span><div class="rep-visit-track"><i style="width:${count?Math.max(8,count/max*100):0}%"></i></div><b>${count}</b></div>`}).join('')}</div>`}
function regionAssignments(r){return `<details class="region-admin" style="--region-color:${r.color}"><summary>${lang==='ar'?'إدارة توزيع العملاء والبياعين على المناطق':'Manage customer and rep assignments'}</summary><div class="region-admin-body"><div class="region-panels"><div class="region-panel"><h4>${lang==='ar'?'توزيع العملاء':'Customer assignments'}</h4>${db.customers.length?`<table><tr><th>${T('customer')}</th><th>${lang==='ar'?'المنطقة':'Region'}</th></tr>${db.customers.map(c=>`<tr><td><b>${esc(c.name)}</b></td><td><select onchange="setEntityRegion('customers','${c.id}',this.value)"><option value="">${lang==='ar'?'بدون منطقة':'No area'}</option>${regionSelectOptions(c.region_id)}</select></td></tr>`).join('')}</table>`:`<div class="empty">${T('empty')}</div>`}</div><div class="region-panel"><h4>${lang==='ar'?'توزيع البياعين':'Sales rep assignments'}</h4>${db.reps.length?`<table><tr><th>${T('rep')}</th><th>${lang==='ar'?'المنطقة':'Region'}</th></tr>${db.reps.map(x=>`<tr><td><b>${esc(x.name)}</b></td><td><select onchange="setEntityRegion('reps','${x.id}',this.value)"><option value="">${lang==='ar'?'بدون منطقة':'No area'}</option>${regionSelectOptions(x.region_id)}</select></td></tr>`).join('')}</table>`:`<div class="empty">${T('empty')}</div>`}</div></div></div></details>`}
function regionProductChart(products,r){if(!products.length)return `<div class="empty">${lang==='ar'?'لا توجد مبيعات مسجلة لعملاء المنطقة':'No recorded sales for this area'}</div>`;let max=Math.max(...products.map(p=>p.qty),1);return `<div class="product-rank">${products.slice(0,8).map(p=>`<div class="product-rank-row"><span>${esc(p.name)}</span><div class="product-track"><i style="width:${Math.max(7,p.qty/max*100)}%"></i></div><b>${p.qty} · ${money(p.total)}</b></div>`).join('')}</div>`}
function regionDetail(r){
  let customers=regionCustomers(r.id),reps=regionReps(r.id),visits=regionVisits(r.id),sales=regionSales(r.id),products=regionProducts(r.id),salesTotal=sales.reduce((a,s)=>a+n(s.total),0);
  let visitCustomerOptions=customers.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join(''),visitRepOptions=reps.map(x=>`<option value="${x.id}">${esc(x.name)}</option>`).join('');
  return `<div id="regionDetail" class="card" style="--region-color:${r.color}"><div class="region-detail-head"><div class="region-title-wrap"><span class="region-color-mark"></span><div><h3>${esc(regionName(r))}</h3><p>${lang==='ar'?'ملخص التغطية والأداء الميداني':'Field coverage and performance overview'}</p></div></div><span class="badge blue">${visits.length} ${lang==='ar'?'زيارة':'visits'}</span></div><div class="region-detail-grid"><div class="stat"><span>${T('customers')}</span><strong>${customers.length}</strong></div><div class="stat"><span>${T('reps')}</span><strong>${reps.length}</strong></div><div class="stat"><span>${lang==='ar'?'إجمالي الزيارات':'Total visits'}</span><strong>${visits.length}</strong></div><div class="stat"><span>${T('salesTotal')}</span><strong>${money(salesTotal)}</strong></div></div><div class="coverage-roster">${rosterCard(lang==='ar'?'عملاء المنطقة':'Area customers',customers,'customer',r)}${rosterCard(lang==='ar'?'فريق المبيعات':'Sales team',reps,'rep',r)}</div><div class="region-panels"><div class="region-panel"><h4>${lang==='ar'?'تسجيل وصول جديد':'Log a new visit'}</h4><div class="visit-form"><div><label>${T('date')}</label><input id="visit_date" type="date" value="${today()}"></div><div><label>${T('customer')}</label><select id="visit_customer">${visitCustomerOptions}</select></div><div><label>${T('rep')}</label><select id="visit_rep">${visitRepOptions}</select></div><div><label>${lang==='ar'?'نتيجة الزيارة':'Visit result'}</label><select id="visit_result"><option>${lang==='ar'?'تمت الزيارة':'Completed'}</option><option>${lang==='ar'?'تم طلب منتجات':'Order placed'}</option><option>${lang==='ar'?'إعادة زيارة':'Follow up'}</option><option>${lang==='ar'?'العميل غير متاح':'Customer unavailable'}</option></select></div><div class="visit-notes"><label>${T('notes')}</label><input id="visit_notes"></div><button class="btn ok" onclick="addVisit()">${lang==='ar'?'تسجيل الوصول':'Log visit'}</button></div><h4 style="margin-top:18px">${lang==='ar'?'آخر التحركات':'Recent activity'}</h4><div class="visit-timeline">${visits.length?visits.slice(0,6).map(v=>`<div class="visit-item"><span class="visit-dot"></span><div><b>${esc(v.customer_name)} · ${esc(v.rep_name)}</b><small>${esc(v.date)} · ${esc(v.result)} ${v.notes?'· '+esc(v.notes):''}</small></div><button class="btn small danger" onclick="deleteVisit('${v.id}')">×</button></div>`).join(''):`<div class="empty">${lang==='ar'?'لا توجد زيارات مسجلة بعد':'No visits recorded yet'}</div>`}</div></div><div class="region-panel"><h4>${lang==='ar'?'المنتجات المباعة':'Products sold'}</h4>${regionProductChart(products,r)}<h4 style="margin-top:20px">${lang==='ar'?'زيارات كل بياع':'Visits by sales rep'}</h4>${repVisitBars(reps,visits)||`<div class="empty">${lang==='ar'?'عيّن بياعين للمنطقة':'Assign sales reps to this area'}</div>`}</div></div>${regionAssignments(r)}</div>`;
}
function regionFullMap(r){return `<div class="regions-map-stage"><span class="map-zone z1"></span><span class="map-zone z2"></span><span class="map-zone z3"></span><svg class="fluid-map-lines" viewBox="0 0 1200 720" preserveAspectRatio="none" aria-hidden="true"><defs><linearGradient id="routeGradient" x1="0" x2="1"><stop offset="0" stop-color="#38bdf8"/><stop offset=".52" stop-color="#14b8a6"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs><path class="route-shadow" d="M-40 560 C170 420 230 530 410 395 S690 190 850 300 S1040 520 1260 310"/><path class="route-main" d="M-40 560 C170 420 230 530 410 395 S690 190 850 300 S1040 520 1260 310"/><path class="route-edge" d="M-40 560 C170 420 230 530 410 395 S690 190 850 300 S1040 520 1260 310"/><path class="route-accent" d="M-40 560 C170 420 230 530 410 395 S690 190 850 300 S1040 520 1260 310"/><path class="route-small" d="M170 -30 C240 145 405 105 480 245 S525 520 690 760"/><path class="route-small" d="M760 -40 C700 130 805 185 960 205 S1110 150 1240 80"/><path class="route-small" d="M-40 245 C150 300 260 220 350 125 S520 20 620 -30"/></svg><div class="full-map-head"><span>${lang==='ar'?'تغطية ميدانية مباشرة':'Live field coverage'}</span><h3>${lang==='ar'?'خريطة المناطق':'Regions map'}</h3><p>${lang==='ar'?'اضغط على نقطة وصول لفتح تفاصيل المنطقة':'Select a location pin to open area details'}</p></div>${db.regions.map(x=>`<button class="map-pin ${regionPanelOpen&&x.id===selectedRegionId?'active':''}" style="left:${x.x}%;top:${x.y}%;--pin:${x.color}" onclick="selectRegion('${x.id}')"><span class="map-pin-dot"></span><span class="map-pin-name">${esc(regionName(x))}</span><span class="map-pin-count">${regionCustomers(x.id).length} ${lang==='ar'?'عميل':'customers'} · ${regionVisits(x.id).length} ${lang==='ar'?'زيارة':'visits'}</span></button>`).join('')}<div class="map-watermark"><b>Mahsoubak Field Map</b> · ${lang==='ar'?'التغطية حسب المناطق':'Coverage by region'}</div>${regionPanelOpen?`<div class="map-detail-backdrop" onclick="closeRegionPanel()"></div><div class="map-detail-drawer"><div class="map-drawer-toolbar"><button class="map-close" onclick="closeRegionPanel()" title="${lang==='ar'?'إغلاق':'Close'}">×</button></div>${regionDetail(r)}</div>`:''}</div>`}
function renderRegions(){
  ensureRegions();let el=document.getElementById('view-regions');if(!el)return;let r=db.regions.find(x=>x.id===selectedRegionId)||db.regions[0];el.innerHTML=regionFullMap(r);
}
function moduleRegionOptions(selected){return `<option value="">${lang==='ar'?'اختر المنطقة':'Choose region'}</option>${db.regions.map(r=>`<option value="${r.id}" ${r.id===selected?'selected':''}>${esc(regionName(r))}</option>`).join('')}`}
function regionEntityFields(table){return table==='customers'?[['name','name'],['type','type'],['phone','phone'],['area','area'],['address','address'],['balance','balance',1],['notes','notes']]:[['name','name'],['phone','phone'],['area','area'],['target','target',1],['notes','notes']]}
function regionEntityPage(table,title){let fields=regionEntityFields(table),form=fields.map(f=>`<div><label>${T(f[1])}</label><input id="${table}_${f[0]}" ${f[2]?'type="number"':''}></div>`).join('');let regionField=`<div><label>${lang==='ar'?'المنطقة الرئيسية':'Main region'}</label><select id="${table}_region_id">${moduleRegionOptions('')}</select></div>`;let rows=db[table].length?`<table><tr>${fields.map(f=>`<th>${T(f[1])}</th>`).join('')}<th>${lang==='ar'?'المنطقة':'Region'}</th><th></th></tr>${db[table].map(row=>`<tr>${fields.map(f=>`<td><input ${f[2]?'type="number"':''} value="${esc(row[f[0]]||'')}" onchange="editCell('${table}','${row.id}','${f[0]}',this.value,${!!f[2]})"></td>`).join('')}<td><select onchange="setModuleEntityRegion('${table}','${row.id}',this.value)">${moduleRegionOptions(entityRegionId(row))}</select></td><td><button class="btn small danger" onclick="del('${table}','${row.id}')">${T('delete')}</button></td></tr>`).join('')}</table>`:`<div class="empty">${T('empty')}</div>`;return `<div class="card"><h3>${title}</h3><div class="grid grid4">${form}${regionField}<div style="display:flex;align-items:end"><button class="btn ok" onclick="addRegionEntity('${table}')">${T('add')}</button></div></div></div><div class="card"><h3>${T(table)}</h3>${rows}</div>`}
function addRegionEntity(table){let fields=regionEntityFields(table),row={id:uid()};fields.forEach(f=>row[f[0]]=document.getElementById(table+'_'+f[0]).value);['balance','target'].forEach(f=>{if(row[f]!==undefined)row[f]=n(row[f])});row.region_id=document.getElementById(table+'_region_id').value;if(!row.name)return alert(T('name'));db[table].unshift(row);render()}
function setModuleEntityRegion(table,id,regionId){let row=db[table].find(x=>x.id===id);if(!row)return;row.region_id=regionId;save();renderRegions()}
function visitSourceLabel(v){if(v.source==='sale')return lang==='ar'?'المبيعات':'Sales';if(v.source==='operation')return 'Operations';return lang==='ar'?'زيارة مسجلة':'Recorded visit'}
function regionReadOnlyDetail(r){let customers=regionCustomers(r.id),reps=regionReps(r.id),visits=regionVisits(r.id),sales=regionSales(r.id),products=regionProducts(r.id),salesTotal=sales.reduce((a,s)=>a+n(s.total),0);return `<div id="regionDetail" class="card" style="--region-color:${r.color}"><div class="region-detail-head"><div class="region-title-wrap"><span class="region-color-mark"></span><div><h3>${esc(regionName(r))}</h3><p>${lang==='ar'?'بيانات حية من موديولات النظام':'Live data from system modules'}</p></div></div></div><div class="region-detail-grid"><div class="stat"><span>${T('customers')}</span><strong>${customers.length}</strong></div><div class="stat"><span>${T('reps')}</span><strong>${reps.length}</strong></div><div class="stat"><span>${lang==='ar'?'الزيارات والحركات':'Visits & activity'}</span><strong>${visits.length}</strong></div><div class="stat"><span>${T('salesTotal')}</span><strong>${money(salesTotal)}</strong></div></div><div class="coverage-roster">${rosterCard(lang==='ar'?'عملاء المنطقة · من موديول العملاء':'Area customers · Customers module',customers,'customer',r)}${rosterCard(lang==='ar'?'فريق المنطقة · من موديول البياعين':'Area team · Sales reps module',reps,'rep',r)}</div><div class="region-panels"><div class="region-panel"><h4>${lang==='ar'?'آخر زيارات وتحركات المنطقة':'Recent area visits and activity'}</h4><div class="visit-timeline">${visits.length?visits.slice(0,12).map(v=>`<div class="visit-item"><span class="visit-dot"></span><div><b>${esc(v.customer_name||'-')} · ${esc(v.rep_name||'-')}</b><small>${esc(v.date)} · ${esc(v.result||'')} ${v.notes?'· '+esc(v.notes):''}</small></div><span class="badge blue">${esc(visitSourceLabel(v))}</span></div>`).join(''):`<div class="empty">${lang==='ar'?'لا توجد عمليات أو مبيعات مسجلة لعملاء المنطقة':'No operations or sales recorded for area customers'}</div>`}</div></div><div class="region-panel"><h4>${lang==='ar'?'المنتجات المباعة · من موديول المبيعات':'Products sold · Sales module'}</h4>${regionProductChart(products,r)}<h4 style="margin-top:22px">${lang==='ar'?'نشاط البياعين':'Sales rep activity'}</h4>${repVisitBars(reps,visits)||`<div class="empty">${lang==='ar'?'لا يوجد بياعون مرتبطون بالمنطقة':'No sales reps linked to this region'}</div>`}</div></div></div>`}
regionDetail=regionReadOnlyDetail;
function customerRegionSnapshot(customer){let id=customer?entityRegionId(customer):'',region=db.regions.find(r=>r.id===id);return {id:id||'',name:region?regionName(region):(lang==='ar'?'غير محددة':'Not assigned')}}
function linkedRegionField(prefix){return `<div class="linked-region-box"><label>${lang==='ar'?'منطقة العميل':'Customer region'}</label><input id="${prefix}_region" class="linked-region-readonly" readonly value=""></div>`}
function updateLinkedRegion(prefix){let select=document.getElementById(prefix+'_customer'),input=document.getElementById(prefix+'_region');if(!select||!input)return;let customer=db.customers.find(c=>c.id===select.value),region=customerRegionSnapshot(customer);input.value=region.name;input.classList.toggle('region-missing',!region.id)}
function transactionRegionName(row){if(row.region_name)return row.region_name;let customer=db.customers.find(c=>c.id===row.customer_id);return customerRegionSnapshot(customer).name}

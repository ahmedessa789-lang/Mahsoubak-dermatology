let selectedPermissionUserId=localStorage.getItem('mb_selected_permission_user')||'';
const PERMISSION_ACTIONS=['view','add','edit','delete'];
function permissionModules(){return Object.keys(titleMap).filter(k=>k!=='users')}
function defaultPermissions(type){
  let perms={};permissionModules().forEach(m=>perms[m]={view:true,add:type==='admin',edit:type==='admin',delete:type==='admin'});
  if(type==='sales'){['dashboard','customers','reps','operations','sales','collections','reports','regions'].forEach(m=>perms[m]&&(perms[m]={view:true,add:true,edit:true,delete:false}));['products','suppliers','purchases','accounts','trial','settings'].forEach(m=>perms[m]&&(perms[m]={view:false,add:false,edit:false,delete:false}))}
  if(type==='stock'){['dashboard','products','operations','purchases','reports'].forEach(m=>perms[m]&&(perms[m]={view:true,add:m!=='dashboard',edit:true,delete:false}));['sales','collections','accounts','trial','settings','regions'].forEach(m=>perms[m]&&(perms[m]={view:false,add:false,edit:false,delete:false}))}
  return perms;
}
function ensureUsers(){
  if(!db.users||!Array.isArray(db.users)||!db.users.length){
    db.users=[
      {id:'user_admin',name:'Admin',username:'admin',role:'admin',active:true,permissions:defaultPermissions('admin')},
      {id:'user_sales',name:'Sales User',username:'sales',role:'sales',active:true,permissions:defaultPermissions('sales')},
      {id:'user_stock',name:'Stock User',username:'stock',role:'stock',active:true,permissions:defaultPermissions('stock')}
    ];
  }
  db.users.forEach(u=>{u.permissions=u.permissions||defaultPermissions(u.role==='admin'?'admin':'sales');permissionModules().forEach(m=>{u.permissions[m]=u.permissions[m]||{view:false,add:false,edit:false,delete:false};PERMISSION_ACTIONS.forEach(a=>{if(typeof u.permissions[m][a]!=='boolean')u.permissions[m][a]=u.role==='admin'})})});
  let id=localStorage.getItem('mb_current_user_id');if(!db.users.some(u=>u.id===id&&u.active!==false)){id=(db.users.find(u=>u.active!==false)||db.users[0]).id;localStorage.setItem('mb_current_user_id',id)}
  if(!selectedPermissionUserId||!db.users.some(u=>u.id===selectedPermissionUserId))selectedPermissionUserId=db.users[0].id;
}
function currentUser(){ensureUsers();return db.users.find(u=>u.id===localStorage.getItem('mb_current_user_id'))||db.users[0]}
function isAdmin(){return currentUser().role==='admin'}
function can(module,action='view'){let u=currentUser();if(!u)return false;if(u.role==='admin')return true;if(module==='users')return false;return !!(u.permissions&&u.permissions[module]&&u.permissions[module][action])}
function permissionAlert(){alert(lang==='ar'?'المستخدم الحالي لا يملك الصلاحية لتنفيذ هذا الإجراء':'The current user does not have permission for this action')}
function firstAllowedModule(){return Object.keys(titleMap).find(m=>can(m,'view'))||'dashboard'}
function ensureAllowedCurrent(){if(!can(current,'view'))current=firstAllowedModule()}
function switchUser(id){localStorage.setItem('mb_current_user_id',id);current=firstAllowedModule();show(current)}
function renderUserSwitcher(){
  let side=document.querySelector('.side');if(!side)return;let html=`<div id="userSwitcher" class="user-switcher"><label>${lang==='ar'?'المستخدم الحالي':'Current user'}</label><select onchange="switchUser(this.value)">${db.users.filter(u=>u.active!==false).map(u=>`<option value="${u.id}" ${currentUser().id===u.id?'selected':''}>${esc(u.name)} - ${esc(u.role)}</option>`).join('')}</select><div class="user-pill">${esc(currentUser().username||currentUser().name)}</div></div>`;

function addUser(){if(!isAdmin())return permissionAlert();let name=document.getElementById('user_name').value.trim(),username=document.getElementById('user_username').value.trim(),role=document.getElementById('user_role').value;if(!name)return alert(T('name'));let u={id:uid(),name,username:username||name,role,active:true,permissions:defaultPermissions(role)};db.users.unshift(u);selectedPermissionUserId=u.id;save();render()}

function renderUsers(){

defaultPermissions=function(type){
  type=normalizeRole(type);
  let perms={};permissionModules().forEach(m=>perms[m]={view:false,add:false,edit:false,delete:false});
  function allow(mods,rights){mods.forEach(m=>{if(perms[m])perms[m]={view:!!rights.view,add:!!rights.add,edit:!!rights.edit,delete:!!rights.delete}})}
  if(type==='operations_manager')permissionModules().forEach(m=>perms[m]={view:true,add:true,edit:true,delete:true});
  if(type==='accounts')allow(['dashboard','sales','collections','reports','accounts','trial'],{view:true,add:true,edit:true,delete:false});
  if(type==='collections')allow(['dashboard','customers','collections','reports','regions'],{view:true,add:true,edit:true,delete:false});

/* ===== v24 Cash flow module ===== */
TR.ar.cashflow='Cash Flow';
TR.en.cashflow='Cash Flow';
TR.ar.cashflowSub='حركة النقد الداخل والخارج والرصيد من القيود اليومية';
TR.en.cashflowSub='Cash in, cash out and balance from journal entries';
titleMap.cashflow='cashflowSub';
icons.cashflow='💵';
document.querySelector('main').insertAdjacentHTML('beforeend','<section id="view-cashflow" class="hidden"></section>');
function cashFlowRange(){
  return {
    from:document.getElementById('cf_from')?.value||reportRange.from||monthStart(),
    to:document.getElementById('cf_to')?.value||reportRange.to||today()
  };
}
function cashSourceLabel(source){
  let ar={sale:'مبيعات',operation_sale:'بيع من العمليات',collection:'تحصيلات',purchase:'مشتريات',manual:'يدوي'};
  let en={sale:'Sales',operation_sale:'Operations sale',collection:'Collections',purchase:'Purchases',manual:'Manual'};
  return (lang==='ar'?ar:en)[source]||source||'Other';
}
function cashFlowData(){
  ensureAccounting();
  let r=cashFlowRange(),cash='1100',opening=n(accountByCode(cash).opening);
  let lines=db.journal.filter(j=>j.account===cash).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  let before=lines.filter(j=>(r.from&&j.date<r.from)).reduce((a,j)=>a+n(j.debit)-n(j.credit),0);
  let rows=lines.filter(j=>(!r.from||j.date>=r.from)&&(!r.to||j.date<=r.to));
  let inflow=rows.reduce((a,j)=>a+n(j.debit),0),outflow=rows.reduce((a,j)=>a+n(j.credit),0);
  let bySource={};
  rows.forEach(j=>{let k=j.source||'manual';bySource[k]=bySource[k]||{source:k,inflow:0,outflow:0,count:0};bySource[k].inflow+=n(j.debit);bySource[k].outflow+=n(j.credit);bySource[k].count++});
  return {from:r.from,to:r.to,opening:opening+before,inflow,outflow,closing:opening+before+inflow-outflow,rows,bySource:Object.values(bySource)};
}
function cashFlowSourceTable(items){
  if(!items.length)return `<div class="empty">${T('empty')}</div>`;
  return `<table><tr><th>${lang==='ar'?'المصدر':'Source'}</th><th>${lang==='ar'?'عدد الحركات':'Count'}</th><th>${lang==='ar'?'داخل':'In'}</th><th>${lang==='ar'?'خارج':'Out'}</th><th>${lang==='ar'?'الصافي':'Net'}</th></tr>${items.map(x=>`<tr><td><b>${esc(cashSourceLabel(x.source))}</b></td><td>${x.count}</td><td>${money(x.inflow)}</td><td>${money(x.outflow)}</td><td><b>${money(x.inflow-x.outflow)}</b></td></tr>`).join('')}</table>`;
}
function cashFlowTable(rows){
  if(!rows.length)return `<div class="empty">${T('empty')}</div>`;
  return `<table><tr><th>${T('date')}</th><th>${lang==='ar'?'المصدر':'Source'}</th><th>${lang==='ar'?'البيان':'Description'}</th><th>${lang==='ar'?'داخل':'Cash in'}</th><th>${lang==='ar'?'خارج':'Cash out'}</th><th>${lang==='ar'?'رقم الحركة':'Transaction'}</th></tr>${rows.slice().reverse().map(j=>`<tr><td>${esc(j.date)}</td><td>${esc(cashSourceLabel(j.source))}</td><td>${esc(j.description||'')}</td><td>${n(j.debit)?money(j.debit):''}</td><td>${n(j.credit)?money(j.credit):''}</td><td><span class="account-code">${esc((j.sourceId||'').slice(-8))}</span></td></tr>`).join('')}</table>`;
}
function cashFlowBars(d){
  let max=Math.max(d.inflow,d.outflow,Math.abs(d.closing),1);
  let items=[
    {label:lang==='ar'?'داخل':'In',value:d.inflow,color:'#16a34a'},
    {label:lang==='ar'?'خارج':'Out',value:d.outflow,color:'#ef4444'},
    {label:lang==='ar'?'رصيد آخر':'Closing',value:Math.abs(d.closing),color:'#2563eb'}
  ];
  return `<div class="big-bars cashflow-bars">${items.map(i=>`<div class="big-col"><i style="height:${Math.max(8,Math.round(i.value/max*100))}%;background:${i.color}!important"></i><b>${i.label}</b><small>${money(i.value)}</small></div>`).join('')}</div>`;
}
function applyCashFlowRange(){reportRange={from:cf_from.value||'',to:cf_to.value||''};saveReportRange();renderCashFlow()}
function exportCashFlowCSV(){
  let d=cashFlowData(),csv='\ufeff'+[['Date','Source','Description','Cash in','Cash out','Transaction'],...d.rows.map(j=>[j.date,cashSourceLabel(j.source),j.description,n(j.debit),n(j.credit),j.sourceId||''])].map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(',')).join('\n');
  let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));a.download='cash_flow.csv';a.click();
}
function renderCashFlow(){
  let el=document.getElementById('view-cashflow');if(!el)return;if(!can('cashflow','view')){el.innerHTML=`<div class="card locked-screen"><h3>${lang==='ar'?'لا توجد صلاحية':'No permission'}</h3></div>`;return}
  let d=cashFlowData();
  el.innerHTML=`<div class="card no-print"><div class="section-title"><div><h3>Cash Flow</h3><p class="hint">${lang==='ar'?'التقرير مبني على حساب الخزينة 1100 في القيود اليومية':'Based on cash account 1100 in journal entries'}</p></div><div class="actions"><button class="btn blue" onclick="window.print()">${T('print')}</button><button class="btn secondary" onclick="exportCashFlowCSV()">Export CSV</button></div></div><div class="grid grid4"><div><label>${lang==='ar'?'من تاريخ':'From'}</label><input id="cf_from" type="date" value="${esc(d.from)}"></div><div><label>${lang==='ar'?'إلى تاريخ':'To'}</label><input id="cf_to" type="date" value="${esc(d.to)}"></div><div style="display:flex;align-items:end"><button class="btn ok" onclick="applyCashFlowRange()">${lang==='ar'?'تطبيق':'Apply'}</button></div></div></div><div class="grid grid4"><div class="card stat"><span>${lang==='ar'?'رصيد أول الفترة':'Opening cash'}</span><strong>${money(d.opening)}</strong></div><div class="card stat"><span>${lang==='ar'?'إجمالي الداخل':'Cash in'}</span><strong>${money(d.inflow)}</strong></div><div class="card stat"><span>${lang==='ar'?'إجمالي الخارج':'Cash out'}</span><strong>${money(d.outflow)}</strong></div><div class="card stat"><span>${lang==='ar'?'رصيد آخر الفترة':'Closing cash'}</span><strong>${money(d.closing)}</strong></div></div>${cashFlowBars(d)}<div class="grid grid2"><div class="card"><h3>${lang==='ar'?'ملخص حسب المصدر':'Summary by source'}</h3>${cashFlowSourceTable(d.bySource)}</div><div class="card"><h3>${lang==='ar'?'تفاصيل حركة النقد':'Cash movement details'}</h3>${cashFlowTable(d.rows)}</div></div>`;
}

/* ===== v27 Supabase shared online database sync ===== */
const SUPABASE_URL='https://fkksydpbfqkctvlkoaom.supabase.co';
const SUPABASE_PUBLISHABLE_KEY='sb_publishable_gq0JyUXR5M57OZAaOd6eEg_6WyzVx9D';
const SUPABASE_TABLE='mahsoubak_db';
const SUPABASE_ROW_ID='main';
let remoteDbReady=false,remoteDbBooted=false,remoteDbSaving=false,remoteDbTimer=null,remoteDbPulling=false;
function onlineBackendEnabled(){return location.protocol==='http:'||location.protocol==='https:'}
function syncStatus(text){let el=document.getElementById('status');if(el)el.textContent=text}
function supabaseHeaders(extra={}){return Object.assign({'apikey':SUPABASE_PUBLISHABLE_KEY,'Authorization':'Bearer '+SUPABASE_PUBLISHABLE_KEY,'Content-Type':'application/json'},extra)}
function supabaseEndpoint(){return SUPABASE_URL.replace(/\/$/,'')+'/rest/v1/'+SUPABASE_TABLE}
function dbLooksUsable(x){return x&&typeof x==='object'&&Array.isArray(x.products)&&Array.isArray(x.customers)&&Array.isArray(x.sales)&&Array.isArray(x.users)}
function scheduleRemoteSave(){if(!remoteDbReady||remoteDbPulling||!onlineBackendEnabled())return;clearTimeout(remoteDbTimer);remoteDbTimer=setTimeout(pushRemoteDb,650)}
async function pushRemoteDb(){
  if(remoteDbSaving||remoteDbPulling||!remoteDbReady||!onlineBackendEnabled())return;
  remoteDbSaving=true;
  try{
    let res=await fetch(supabaseEndpoint()+'?id=eq.'+encodeURIComponent(SUPABASE_ROW_ID),{method:'PATCH',headers:supabaseHeaders({'Prefer':'return=minimal'}),body:JSON.stringify({data:db,updated_at:new Date().toISOString()})});
    if(!res.ok){
      res=await fetch(supabaseEndpoint(),{method:'POST',headers:supabaseHeaders({'Prefer':'resolution=merge-duplicates,return=minimal'}),body:JSON.stringify({id:SUPABASE_ROW_ID,data:db,updated_at:new Date().toISOString()})});
    }
    if(!res.ok)throw new Error('Supabase save failed');
    syncStatus(lang==='ar'?'Online: تم حفظ البيانات على Supabase':'Online: saved to Supabase');
  }catch(e){
    console.error(e);
    syncStatus(lang==='ar'?'Online: تعذر الحفظ على Supabase - تم الحفظ محليًا':'Online: Supabase save failed - saved locally');
  }finally{remoteDbSaving=false}
}
async function pullRemoteDb(){
  if(remoteDbBooted||!onlineBackendEnabled())return;
  remoteDbBooted=true;remoteDbPulling=true;
  try{
    let res=await fetch(supabaseEndpoint()+'?id=eq.'+encodeURIComponent(SUPABASE_ROW_ID)+'&select=data',{method:'GET',headers:supabaseHeaders(),cache:'no-store'});
    if(!res.ok)throw new Error('Supabase load failed');
    let rows=await res.json();
    let remoteData=rows&&rows[0]&&rows[0].data;
    remoteDbReady=true;
    if(dbLooksUsable(remoteData)){
      db=remoteData;
      localStorage.setItem(KEY,JSON.stringify(db));
      syncStatus(lang==='ar'?'Online: تم تحميل البيانات المشتركة من Supabase':'Online: shared data loaded from Supabase');
    }else{
      syncStatus(lang==='ar'?'Online: قاعدة Supabase فارغة - جاري رفع النسخة الحالية':'Online: Supabase is empty - uploading current data');
      remoteDbPulling=false;
      await pushRemoteDb();
      remoteDbPulling=true;
    }
    render();
  }catch(e){
    console.error(e);
    remoteDbReady=false;
    syncStatus(lang==='ar'?'Offline: تعذر الاتصال بـ Supabase والبيانات محلية':'Offline: Supabase unavailable, local data only');
  }finally{remoteDbPulling=false}
}
const saveBeforeSupabaseSyncV27=save;
save=function(){
  localStorage.setItem(KEY,JSON.stringify(db));
  syncStatus(remoteDbReady?(lang==='ar'?'Online: جاري حفظ البيانات على Supabase':'Online: saving to Supabase'):(lang==='ar'?'Offline: محفوظ محليًا':'Offline: saved locally'));
  scheduleRemoteSave();
}
setTimeout(pullRemoteDb,300);

render();
